  function getCalculations() {
    var qualification = getQualification();
    var urgentBranch = data.entryPath === FLOW_ENTRY.URGENT ? getUrgentBranch() : "";
    var stageScore = getMaxStageScore();
    var deadlineScore = Math.max(getOptionScore(DEADLINE_OPTIONS, data.deadlineStatus), getOptionScore(DEADLINE_OPTIONS, data.papersDeadlineStatus));
    var validationScore = getOptionScore(VALIDATION_OPTIONS, data.validationNotice);
    var behaviorScore = Math.min(45, data.behaviors.reduce(function (sum, key) { return sum + getOptionScore(BEHAVIOR_OPTIONS, key); }, 0));
    if (urgentBranch === "collector_harassment") behaviorScore = 0;
    var amountScore = getLargestAmountScore();
    var countScore = getDebtCountUrgencyScore();
    var entryScore = data.entryPath === FLOW_ENTRY.URGENT ? 15 : 0;
    var urgentScore = data.entryPath === FLOW_ENTRY.URGENT ? getUrgentEventScore() + getUrgentBranchDetailScore() : 0;
    var urgencyScore = Math.min(100, stageScore + deadlineScore + validationScore + behaviorScore + amountScore + countScore + entryScore + urgentScore);
    if (urgentBranch === "collector_harassment") urgencyScore = Math.min(urgencyScore, 74);
    var urgencyLevel = urgencyScore >= 75 ? "Critical" : urgencyScore >= 50 ? "High" : urgencyScore >= 25 ? "Moderate" : "Low";
    var readinessScore = getReadinessScore();
    var readinessLevel = readinessScore >= 81 ? "High-Readiness Case" : readinessScore >= 61 ? "Ready for Initial Review" : readinessScore >= 31 ? "Partially Ready" : "Needs More Information";

    return {
      qualificationStatus: qualification.status,
      qualificationReasons: qualification.reasons,
      qualificationClass: qualification.className,
      urgentBranch: urgentBranch,
      urgencyScore: urgencyScore,
      urgencyLevel: urgencyLevel,
      urgencyClass: urgencyLevel === "Critical" ? "cl-pill-critical" : urgencyLevel === "High" ? "cl-pill-high" : urgencyLevel === "Moderate" ? "" : "cl-pill-good",
      readinessScore: readinessScore,
      readinessLevel: readinessLevel,
      highestRiskStage: getHighestRiskStage(),
      hasLawsuit: hasLawsuit(),
      hasDefaultJudgment: hasDefaultJudgment(),
      hasGarnishment: hasGarnishment(),
      hasWagesOrBankAffected: hasWagesOrBankAffected(),
      hasHarassment: hasHarassment()
    };
  }

  function getOptionScore(list, key) {
    var item = list.find(function (x) { return x.key === key; });
    return item ? item.score : 0;
  }

  function getMaxStageScore() {
    return data.debts.reduce(function (max, debt) {
      return Math.max(max, getOptionScore(STAGE_OPTIONS, debt.stage));
    }, 0);
  }

  function getDebtCountUrgencyScore() {
    if (data.debtCountChoice === "6_plus") return 15;
    if (data.debtCountChoice === "3_5" || data.debts.length >= 3) return 10;
    if (data.debtCountChoice === "multiple" || data.debts.length === 2) return 5;
    return 0;
  }

  function getUrgentEventScore() {
    return Math.min(85, data.urgentEvents.reduce(function (sum, key) {
      return sum + getOptionScore(URGENT_TRIAGE_OPTIONS, key);
    }, 0));
  }

  function getUrgentBranchDetailScore() {
    var score = 0;
    if (data.papersDeadlineStatus) score += getOptionScore(DEADLINE_OPTIONS, data.papersDeadlineStatus);
    if (data.judgmentWagesBankAffected === "yes") score += 20;
    if (data.wagesBeingGarnished === "yes") score += 30;
    if (data.bankAccountAffected === "yes") score += 35;
    if (data.enforcementPaperwork === "yes") score += 10;
    if (data.urgentDocumentsAvailable === "yes" || data.urgentEvents.includes("not_sure_documents")) score += 15;
    return Math.min(50, score);
  }

  function getHighestRiskStage() {
    if (data.entryPath === FLOW_ENTRY.URGENT) {
      var branch = getUrgentBranch();
      if (branch === "garnishment_or_bank_wage_impact") return data.bankAccountAffected === "yes" ? "wages_bank" : "garnishment";
      if (branch === "default_judgment") return "default_judgment";
      if (branch === "lawsuit_or_summons") return "lawsuit";
      if (branch === "collector_harassment") return "calls";
      if (data.urgentEvents.includes("letters_not_sure")) return "notices";
      return "not_sure";
    }
    var sorted = data.debts.slice().sort(function (a, b) {
      return getOptionScore(STAGE_OPTIONS, b.stage) - getOptionScore(STAGE_OPTIONS, a.stage);
    });
    return sorted[0] ? sorted[0].stage : "";
  }

  function getLargestAmountScore() {
    return data.debts.reduce(function (max, debt) {
      return Math.max(max, getAmountOption(debt.amount).score || 0);
    }, 0);
  }

  function hasLawsuit() {
    return data.urgentEvents.some(function (key) { return ["lawsuit_papers", "deadline_court_hearing"].includes(key); }) || data.debts.some(function (d) { return d.stage === "lawsuit" || d.documentStatus === "summons_lawsuit"; }) || ["within_7", "within_8_14", "within_15_30", "yes_not_sure_when"].includes(data.deadlineStatus) || ["within_7", "within_8_14", "within_15_30", "yes_not_sure_when"].includes(data.papersDeadlineStatus);
  }

  function hasDefaultJudgment() {
    return data.urgentEvents.includes("default_judgment") || data.debts.some(function (d) { return d.stage === "default_judgment" || d.documentStatus === "judgment"; });
  }

  function hasGarnishment() {
    return data.urgentEvents.some(function (key) { return ["wage_garnishment", "bank_wages_affected"].includes(key); }) || data.wagesBeingGarnished === "yes" || data.bankAccountAffected === "yes" || data.debts.some(function (d) { return d.stage === "garnishment" || d.stage === "wages_bank" || d.documentStatus === "garnishment_order"; });
  }

  function hasWagesOrBankAffected() {
    return data.urgentEvents.includes("bank_wages_affected") || data.bankAccountAffected === "yes" || data.judgmentWagesBankAffected === "yes" || data.debts.some(function (d) { return d.stage === "wages_bank"; });
  }

  function hasHarassment() {
    return data.urgentEvents.some(function (key) {
      return ["collector_repeated_calls", "collector_workplace_calls", "collector_third_party_contact", "collector_threats_abusive"].includes(key);
    }) || data.behaviors.some(function (key) {
      return !["none_of_these", "letters_only"].includes(key);
    });
  }

  function getUrgentBranch() {
    var events = data.urgentEvents || [];
    if (events.some(function (key) { return ["wage_garnishment", "bank_wages_affected"].includes(key); })) return "garnishment_or_bank_wage_impact";
    if (events.includes("default_judgment")) return "default_judgment";
    if (events.some(function (key) { return ["lawsuit_papers", "deadline_court_hearing"].includes(key); })) return "lawsuit_or_summons";
    if (events.some(function (key) { return ["collector_repeated_calls", "collector_workplace_calls", "collector_third_party_contact", "collector_threats_abusive"].includes(key); })) return "collector_harassment";
    return "not_sure_document_review";
  }

  function getQualification() {
    var reasons = [];
    var stateExcluded = CONFIG.excludedStates.includes(data.state);
    var business = data.personType === "business";
    var eligibleDebts = data.debts.filter(isDebtEligible);
    var conditionalDebts = data.debts.filter(isDebtConditional);
    var unsupportedDebts = data.debts.filter(function (d) { return UNSUPPORTED_DEBT_KEYS.includes(d.type); });
    var supportedDebts = data.debts.filter(function (d) { return SUPPORTED_DEBT_KEYS.includes(d.type); });

    if (stateExcluded) reasons.push("State currently not serviced: " + data.state);
    if (business) reasons.push("Business debt is outside the consumer-debt flow");
    if (!supportedDebts.length && unsupportedDebts.length && !conditionalDebts.length) reasons.push("Only unsupported debt types selected");
    if (!supportedDebts.length && unsupportedDebts.length && conditionalDebts.length) reasons.push("Unsupported debt type selected; other debt details need review");
    if (!eligibleDebts.length && supportedDebts.length && data.debts.every(function (d) { return d.security === "secured" && !(d.type === "auto_repossession" && d.autoRepossessionStatus === "repossessed_yes"); })) {
      reasons.push("Selected debt appears secured with collateral");
    }

    if (stateExcluded || business || (!supportedDebts.length && unsupportedDebts.length) || (!eligibleDebts.length && supportedDebts.length && !conditionalDebts.length)) {
      return { status: "Not a Fit", reasons: reasons, className: "cl-pill-critical" };
    }

    if (eligibleDebts.length && (unsupportedDebts.length || conditionalDebts.length)) {
      if (unsupportedDebts.length) reasons.push("Some selected debts are not supported");
      if (conditionalDebts.length) reasons.push("Some debts need review to confirm unsecured status");
      return { status: "Partially Qualified", reasons: reasons, className: "cl-pill-high" };
    }

    if (!eligibleDebts.length && conditionalDebts.length) {
      reasons.push("Documents or more details may be needed to confirm fit");
      return { status: "Needs Review", reasons: reasons, className: "cl-pill-high" };
    }

    if (eligibleDebts.length) {
      return { status: "Qualified", reasons: ["Supported unsecured consumer-debt issue selected"], className: "cl-pill-good" };
    }

    return { status: "Needs Review", reasons: ["Debt type or security status is unclear"], className: "cl-pill-high" };
  }

  function isDebtEligible(debt) {
    if (!SUPPORTED_DEBT_KEYS.includes(debt.type)) return false;
    if (debt.type === "auto_repossession") {
      return debt.security === "unsecured" || debt.autoRepossessionStatus === "repossessed_yes";
    }
    return debt.security === "unsecured";
  }

  function isDebtConditional(debt) {
    if (debt.type === "other_not_sure") return true;
    if (SUPPORTED_DEBT_KEYS.includes(debt.type) && debt.security === "not_sure") return true;
    if (debt.type === "auto_repossession" && debt.autoRepossessionStatus === "not_sure") return true;
    return false;
  }

  function getReadinessScore() {
    var score = 0;
    if (data.debts.some(function (d) { return SUPPORTED_DEBT_KEYS.includes(d.type); })) score += 20;
    if (data.debts.some(function (d) { return d.security === "unsecured" || (d.type === "auto_repossession" && d.autoRepossessionStatus === "repossessed_yes"); })) score += 15;
    if (data.debtCountChoice) score += 5;
    if (data.debts.every(function (d) { return !!d.amount; })) score += 15;
    if (hasKnownStageSignal()) score += 15;
    if (data.debts.some(function (d) { return d.creditorName.trim(); })) score += 10;
    if (hasDocumentSignal()) score += 10;
    if (hasDeadlineSignal()) score += 10;
    if (hasCollectorBehaviorSignal()) score += 5;
    if (data.deliveryChannel) score += 5;
    return Math.min(100, score);
  }

  function getMissingReadinessItems() {
    var items = [];
    if (!data.debts.some(function (d) { return SUPPORTED_DEBT_KEYS.includes(d.type); })) items.push("Confirm whether any debt is credit card, medical, payday loan, utilities, or auto repossession related.");
    if (!data.debts.some(function (d) { return d.security === "unsecured" || (d.type === "auto_repossession" && d.autoRepossessionStatus === "repossessed_yes"); })) items.push("Confirm whether the debt is unsecured or connected to a post-repossession balance.");
    if (!data.debts.every(function (d) { return !!d.amount; })) items.push("Approximate amount for each debt.");
    if (!hasKnownStageSignal()) items.push("Current stage: collections, lawsuit, judgment, garnishment, bank/wage impact, or other.");
    if (!data.debts.some(function (d) { return d.creditorName.trim(); })) items.push("Creditor or debt collector name, if known.");
    if (!hasDocumentSignal()) items.push("Any collection letter, notice, summons, judgment, or garnishment document.");
    if (!hasDeadlineSignal()) items.push("Any deadline, court date, hearing date, judgment date, or garnishment date listed on the papers.");
    return items.slice(0, 5);
  }

  function hasKnownStageSignal() {
    if (data.entryPath === FLOW_ENTRY.URGENT && data.urgentEvents.length && !data.urgentEvents.includes("none_not_sure")) return true;
    return data.debts.every(function (d) { return d.stage && d.stage !== "not_sure"; });
  }

  function hasDocumentSignal() {
    return data.uploadIntent || data.urgentEvents.includes("not_sure_documents") || data.papersAvailable === "yes" || data.judgmentCopyAvailable === "yes" || data.enforcementPaperwork === "yes" || data.urgentDocumentsAvailable === "yes" || data.debts.some(function (d) {
      return !["", "none", "not_sure"].includes(d.documentStatus);
    });
  }

  function hasDeadlineSignal() {
    return (data.deadlineStatus && data.deadlineStatus !== "not_sure") || (data.papersDeadlineStatus && data.papersDeadlineStatus !== "not_sure") || data.urgentEvents.includes("deadline_court_hearing");
  }

  function hasCollectorBehaviorSignal() {
    return data.behaviors.length && !data.behaviors.includes("none_of_these") || data.urgentEvents.some(function (key) {
      return ["collector_repeated_calls", "collector_workplace_calls", "collector_third_party_contact", "collector_threats_abusive"].includes(key);
    });
  }

  function getBranchMessage(calc) {
    if (calc.qualificationStatus === "Not a Fit") {
      return {
        title: "This may not fit Credo Legal's current review criteria.",
        body: "Based on your answers, the issue may involve an excluded state, business debt, unsupported debt type, or secured debt. You can still send yourself the summary, but this request may be marked as not a fit for the intake team.",
        nextStep: "Review the summary and, if anything was selected incorrectly, restart the check or contact the team directly.",
        checklist: calc.qualificationReasons.length ? calc.qualificationReasons : ["Confirm state, debt type, and whether the debt is unsecured."]
      };
    }

    if (calc.hasGarnishment) {
      return {
        title: "Active garnishment or wage/bank impact may be involved.",
        body: "This appears to be an active collection enforcement issue. If wages or bank funds are being affected, your situation should be reviewed quickly.",
        nextStep: "Prepare any garnishment, bank levy, judgment, payroll, or court paperwork and request an immediate callback or call now.",
        checklist: ["Garnishment or levy notice", "Judgment papers", "Employer or bank notice", "Date wages or bank funds were affected"]
      };
    }

    if (calc.hasDefaultJudgment) {
      return {
        title: "A default judgment may be involved.",
        body: "A judgment can give a collector stronger collection tools depending on the court order and state law. Your next step is to understand what judgment was entered and whether any options remain.",
        nextStep: "Prepare the judgment paperwork, court name, date entered, and any wage or bank collection notices, then request urgent review or a callback.",
        checklist: ["Copy of judgment", "Court name", "Date judgment was entered", "Any garnishment or bank levy notice"]
      };
    }

    if (calc.hasLawsuit) {
      return {
        title: "Do not ignore court papers or lawsuit deadlines.",
        body: "Debt lawsuits may involve strict response deadlines. Ignoring them may increase the risk of a default judgment or other collection action. Your exact options depend on your documents, the court, and your situation.",
        nextStep: "Prioritize document review and request an immediate callback so the papers and any deadlines can be reviewed.",
        checklist: ["Summons or complaint", "Date you received the papers", "Court name", "Plaintiff / creditor / collector name", "Any response deadline or hearing date"]
      };
    }

    if (calc.hasHarassment) {
      return {
        title: "Collector behavior may need review.",
        body: "Your answers suggest collectors may be contacting you aggressively or using pressure tactics. Certain abusive, deceptive, or unfair collection practices may be restricted under federal law.",
        nextStep: "Document what happened, when it happened, who contacted you, and request a collector behavior review without assuming a specific legal outcome.",
        checklist: ["Call logs", "Voicemails or text messages", "Letters or notices", "Names of collectors", "Workplace or third-party contact details"]
      };
    }

    if (data.entryPath === FLOW_ENTRY.URGENT && calc.urgentBranch === "not_sure_document_review") {
      return {
        title: "Document review may be the best next step.",
        body: "If you are not sure what the letter, notice, summons, judgment, or collection document means, the next step is to organize the documents and have the situation reviewed.",
        nextStep: "Send yourself the full Snapshot, prepare the document, and request a callback or message-first follow-up.",
        checklist: ["Letter, summons, notice, judgment, or collection document", "Any date or deadline shown", "Creditor or collector name", "Approximate debt amount"]
      };
    }

    return {
      title: "Your debt situation appears ready for an options review.",
      body: "Based on your answers, your situation may involve unsecured consumer debt that Credo Legal can review. The priority level depends on stage, documents, deadlines, and collector behavior.",
      nextStep: "Send yourself the full Snapshot, prepare your debt documents, and choose how you want the team to follow up.",
      checklist: ["Creditor or collector name", "Approximate debt amount", "Any notices or collection letters", "Dates of recent calls or letters"]
    };
  }

  function generateDebtDefenseReport(calc) {
    var branch = getBranchMessage(calc);
    var situationType = deriveSituationType(calc);
    var quickSummary = generateQuickSummary(calc, branch, situationType);
    var riskFlags = generateRiskFlags(calc);
    var documentChecklist = generateDocumentChecklist(calc);
    var readinessBreakdown = generateReadinessBreakdown(calc);
    var suggestedNextSteps = generateSuggestedNextSteps(calc.urgencyLevel);
    var commonMistakes = generateCommonMistakes();
    var collectorBehaviorReview = generateCollectorBehaviorReview();
    var fitCheck = generateFitCheck(calc);
    var situationSummary = generateSituationSummary(calc);
    var fullSnapshot = {
      header: {
        title: "Debt Defense Snapshot",
        snapshotId: data.snapshotId,
        generatedAt: data.reportGeneratedAt,
        entryPath: getEntryPathLabel(data.entryPath),
        state: data.state,
        qualificationStatus: calc.qualificationStatus,
        priorityLevel: calc.urgencyLevel,
        readinessLevel: calc.readinessLevel
      },
      situationSummary: situationSummary,
      priority: {
        score: calc.urgencyScore,
        level: calc.urgencyLevel,
        explanation: generatePriorityExplanation(calc.urgencyLevel)
      },
      fitCheck: fitCheck,
      riskFlags: riskFlags,
      collectorBehaviorReview: collectorBehaviorReview,
      documentChecklist: documentChecklist,
      readinessBreakdown: readinessBreakdown,
      suggestedNextSteps: suggestedNextSteps,
      commonMistakes: commonMistakes,
      disclaimer: getSnapshotDisclaimer()
    };
    var report = {
      snapshotId: data.snapshotId,
      generatedAt: data.reportGeneratedAt,
      generatedAtDisplay: formatDateTime(data.reportGeneratedAt),
      entryPath: data.entryPath,
      entryPathLabel: getEntryPathLabel(data.entryPath),
      situationType: situationType,
      quickSummary: quickSummary,
      fullSnapshot: fullSnapshot
    };
    report.textVersion = reportToText(report);
    report.jsonVersion = JSON.stringify(report);
    return report;
  }

  function deriveSituationType(calc) {
    if (calc.qualificationStatus === "Not a Fit") return "Not a Fit for Credo Legal Intake";
    if (calc.hasGarnishment || calc.hasDefaultJudgment) return "Judgment or Garnishment Concern";
    if (calc.hasLawsuit) return "Lawsuit or Court Papers";
    if (calc.hasHarassment) return "Collection Harassment Concern";
    if (data.urgentEvents.includes("not_sure_documents") || data.urgentEvents.includes("letters_not_sure") || hasDocumentSignal() && calc.highestRiskStage === "not_sure") return "Document Review Recommended";
    if (["collections", "notices", "calls"].includes(calc.highestRiskStage) || data.deadlineStatus || data.validationNotice) return "Active Collection Pressure";
    if (calc.qualificationStatus === "Needs Review" || calc.qualificationStatus === "Partially Qualified") return "Mixed / Needs Review";
    return "Early-Stage Debt Concern";
  }

  function generateQuickSummary(calc, branch, situationType) {
    return {
      title: "Your Quick Debt Defense Summary",
      snapshotId: data.snapshotId,
      generatedAt: data.reportGeneratedAt,
      entryPath: getEntryPathLabel(data.entryPath),
      priorityLevel: calc.urgencyLevel,
      readinessScore: calc.readinessScore,
      readinessLevel: calc.readinessLevel,
      situationType: situationType,
      topFindings: generateTopFindings(calc, situationType),
      recommendedNextAction: branch.nextStep
    };
  }

  function generateTopFindings(calc, situationType) {
    var findings = [];
    if (calc.qualificationStatus === "Not a Fit") {
      findings.push("Based on your answers, this may not fit Credo Legal's current intake criteria.");
      findings.push((calc.qualificationReasons[0] || "State, debt type, business status, or secured debt details may need review.") + ".");
      findings.push("This Snapshot can still help organize information when seeking the right type of help.");
    } else if (calc.hasGarnishment) {
      findings.push("You indicated that wages or a bank account may already be affected.");
      findings.push("This may be an active collection enforcement issue.");
      findings.push("Your next step may be to gather any court, employer, bank, or collector paperwork.");
    } else if (calc.hasDefaultJudgment) {
      findings.push("You indicated that a judgment may be involved.");
      findings.push("A judgment may give collectors stronger collection tools depending on the court order and state law.");
      findings.push("Your next step may be to locate the judgment and any wage or bank notices.");
    } else if (calc.hasLawsuit) {
      findings.push("You indicated that a lawsuit, summons, or court papers may be involved.");
      findings.push("Court papers may include strict response deadlines.");
      findings.push("Your next step may be to locate the papers and request a document review.");
    } else if (calc.hasHarassment) {
      findings.push("You reported collector contact pressure or possible harassment.");
      findings.push("Certain abusive, deceptive, or unfair collection practices may be restricted by law.");
      findings.push("Your next step may be to document calls, messages, and any third-party contact.");
    } else if (situationType === "Document Review Recommended") {
      findings.push("You indicated that documents may exist but the situation may be hard to classify.");
      findings.push("Letters, notices, summons, judgments, or garnishment papers may change the assessment.");
      findings.push("Your next step may be to gather the documents before speaking with the team.");
    } else if (calc.urgencyLevel === "Low") {
      findings.push("Your situation appears to be earlier-stage based on your answers.");
      findings.push("It may still be useful to understand your debt type, stage, and available next steps.");
      findings.push("Your next step may be to gather account details before the debt escalates.");
    } else {
      findings.push("Your debt appears to be in an active collection stage.");
      findings.push("Letters, notices, calls, or validation information may be important.");
      findings.push("Your next step may be to gather collector details and any recent notices.");
    }
    return findings.slice(0, 3);
  }

  function generateRiskFlags(calc) {
    var flags = [];
    if (calc.hasLawsuit) flags.push(makeRiskFlag("High", "Lawsuit / Summons Mentioned", "Court papers should not be ignored. A response deadline may apply."));
    if (hasDeadlineSignal()) flags.push(makeRiskFlag("High", "Deadline / Court Date Mentioned", "You indicated that a deadline, court date, or hearing may be involved. The date should be checked against your documents."));
    if (calc.hasDefaultJudgment) flags.push(makeRiskFlag("High", "Default Judgment Mentioned", "A judgment may give collectors stronger collection tools depending on the court order and state law."));
    if (calc.hasGarnishment) flags.push(makeRiskFlag("High", "Garnishment / Wage or Bank Impact", "You indicated that wages or bank funds may already be affected. This may require prompt review."));
    if (data.urgentEvents.includes("collector_workplace_calls") || data.behaviors.includes("calling_workplace")) flags.push(makeRiskFlag("Medium", "Workplace Calls", "You indicated that collectors may be calling your workplace. The details of those calls may matter."));
    if (data.urgentEvents.includes("collector_third_party_contact") || data.behaviors.includes("contacting_others")) flags.push(makeRiskFlag("Medium", "Third-Party Contact", "You indicated that collectors may be contacting family, friends, or other people. The details may matter."));
    if (data.urgentEvents.includes("collector_threats_abusive") || data.behaviors.some(function (key) { return ["threatening", "abusive_language", "threatening_arrest", "threatening_garnishment"].includes(key); })) flags.push(makeRiskFlag("Medium", "Threats or Abusive Language", "You indicated possible threats or abusive language. It may be important to document exactly what was said and when."));
    if (data.validationNotice === "within_30") flags.push(makeRiskFlag("Medium", "Validation Notice Window", "If you recently received validation information, there may be a time-sensitive window to dispute the debt in writing."));
    if (data.debts.some(function (d) { return UNSUPPORTED_DEBT_KEYS.includes(d.type); })) flags.push(makeRiskFlag("Medium", "Unsupported Debt Type", "One or more selected debt types may not fit Credo Legal's current intake criteria."));
    if (data.debts.some(function (d) { return d.security === "secured"; })) flags.push(makeRiskFlag("Medium", "Secured Debt Concern", "Credo Legal generally focuses on unsecured consumer debt. Secured debts may require a different review."));
    if (!flags.length) flags.push(makeRiskFlag("Low", "No major red flags identified from your answers", "No major red flags were identified from your answers, but your documents and exact facts may change the assessment."));
    return flags;
  }

  function makeRiskFlag(severity, title, explanation) {
    return { severity: severity, title: title, explanation: explanation };
  }

  function generateDocumentChecklist(calc) {
    var items = [
      "Collector or creditor name",
      "Approximate balance",
      "Any collection letters or notices",
      "Dates of contact",
      "Any account statements",
      "Call logs, voicemails, texts, or letters"
    ];
    if (calc.hasLawsuit) {
      items = items.concat(["Summons", "Complaint", "Court name", "Date served", "Response deadline", "Hearing date"]);
    }
    if (calc.hasDefaultJudgment) {
      items = items.concat(["Judgment document", "Court name", "Date judgment was entered", "Any notice from court or collector"]);
    }
    if (calc.hasGarnishment || calc.hasWagesOrBankAffected) {
      items = items.concat(["Garnishment notice", "Employer notice", "Bank notice", "Court order, if available", "Date wages or bank account were affected"]);
    }
    if (data.validationNotice && data.validationNotice !== "not_sure" && data.validationNotice !== "no") {
      items = items.concat(["Validation notice", "Date received", "Original creditor name", "Amount listed", "Dispute instructions"]);
    }
    if (data.debts.some(function (d) { return d.type === "auto_repossession"; })) {
      items = items.concat(["Repossession notice", "Deficiency balance notice", "Sale notice", "Remaining balance documentation"]);
    }
    return unique(items);
  }

  function generateReadinessBreakdown(calc) {
    var helped = [];
    if (data.debts.some(function (d) { return !!d.type; })) helped.push("You identified the debt type.");
    if (data.debts.some(function (d) { return !!d.amount; })) helped.push("You estimated the debt amount.");
    if (hasKnownStageSignal()) helped.push("You selected or described the current collection stage.");
    if (data.debts.some(function (d) { return !!d.security; })) helped.push("You addressed whether the debt is unsecured.");
    if (hasDocumentSignal()) helped.push("You said documents may be available.");
    if (hasDeadlineSignal()) helped.push("You identified a possible deadline, court date, or hearing date.");
    if (hasCollectorBehaviorSignal()) helped.push("You described collector behavior.");
    if (data.deliveryChannel) helped.push("You selected a delivery channel for the full Snapshot.");
    if (!helped.length) helped.push("You started organizing the information needed for review.");
    return {
      score: calc.readinessScore,
      level: calc.readinessLevel,
      helped: helped,
      missing: getMissingReadinessItems()
    };
  }

  function generateSuggestedNextSteps(urgencyLevel) {
    if (urgencyLevel === "Critical") {
      return [
        "Locate any court papers, judgment, garnishment, wage, bank, or deadline documents.",
        "Do not ignore any listed deadline, court date, or response date.",
        "Request a prompt review or callback so the information can be checked."
      ];
    }
    if (urgencyLevel === "High") {
      return [
        "Gather collector letters, notices, court papers, or call records.",
        "Identify the collector or creditor name, amount, and dates.",
        "Request a review to understand what options may be available."
      ];
    }
    if (urgencyLevel === "Moderate") {
      return [
        "Confirm the debt type, amount, and collector or creditor name.",
        "Gather recent notices or validation information.",
        "Review whether the debt type and stage may fit Credo Legal's intake criteria."
      ];
    }
    return [
      "Gather account details and any collection letters.",
      "Keep a record of collector contact if it begins or escalates.",
      "Review your options before the debt escalates further."
    ];
  }

  function generateCommonMistakes() {
    return [
      "Ignoring court papers or deadlines",
      "Throwing away collection letters",
      "Agreeing to payment terms without understanding the debt",
      "Failing to keep records of calls, texts, voicemails, and letters",
      "Assuming the collector's information is complete without reviewing documents",
      "Waiting until wages or bank accounts are affected before seeking information"
    ];
  }

  function generateCollectorBehaviorReview() {
    var behaviors = getCollectorBehaviorLabels();
    var intro = behaviors.length ? "You reported one or more collector contact issues." : "You did not report specific collector contact pressure in this assessment. If collectors contact you later, keeping a record of calls, texts, voicemails, and letters may be helpful.";
    return {
      included: true,
      intro: intro,
      selectedBehaviors: behaviors,
      explanation: behaviors.length ? "Certain abusive, deceptive, or unfair debt collection practices may be restricted under federal law. Your exact options depend on who contacted you, what was said, when the contact happened, and whether anyone else was contacted." : "",
      callLogTemplate: [
        "Date:",
        "Time:",
        "Collector name:",
        "Phone number:",
        "What they said:",
        "Did they mention legal action?",
        "Did they contact anyone else?",
        "Did they leave a voicemail, text, or letter?"
      ]
    };
  }

  function generateFitCheck(calc) {
    var factors = [];
    if (data.personType === "self" || data.personType === "family") factors.push("Individual consumer debt");
    if (data.debts.some(function (d) { return SUPPORTED_DEBT_KEYS.includes(d.type); })) factors.push("Supported debt type");
    if (data.debts.some(function (d) { return d.security === "unsecured" || d.security === "not_sure" || (d.type === "auto_repossession" && d.autoRepossessionStatus === "repossessed_yes"); })) factors.push("Unsecured or potentially unsecured debt");
    if (hasKnownStageSignal()) factors.push("Active collection issue or stage information");
    var intro = "Some details may need review before fit can be confirmed.";
    if (calc.qualificationStatus === "Qualified") intro = "Based on your answers, your situation may fit the type of unsecured consumer debt matters Credo Legal reviews.";
    if (calc.qualificationStatus === "Not a Fit") intro = "Based on your answers, this may not fit the type of debt matters Credo Legal currently reviews. This summary can still help you understand what information may be important when seeking the right type of help.";
    return {
      status: calc.qualificationStatus,
      intro: intro,
      factors: factors,
      concerns: calc.qualificationReasons
    };
  }

  function generateSituationSummary(calc) {
    var debtTypeLabels = unique(data.debts.map(function (d) { return getLabel(DEBT_TYPES, d.type); }).filter(Boolean));
    var supportedDebtTypes = unique(data.debts.filter(function (d) { return SUPPORTED_DEBT_KEYS.includes(d.type); }).map(function (d) { return getLabel(DEBT_TYPES, d.type); }));
    var unsupportedDebtTypes = unique(data.debts.filter(function (d) { return UNSUPPORTED_DEBT_KEYS.includes(d.type); }).map(function (d) { return getLabel(DEBT_TYPES, d.type); }));
    var largestDebt = data.debts.slice().sort(function (a, b) { return (getAmountOption(b.amount).estimate || 0) - (getAmountOption(a.amount).estimate || 0); })[0] || makeDebt();
    return [
      makeSummaryLine("Debt type", debtTypeLabels.join(", ") || "Not sure"),
      makeSummaryLine("Supported debt types", supportedDebtTypes.join(", ") || "None selected"),
      makeSummaryLine("Unsupported debt types", unsupportedDebtTypes.join(", ") || "None selected"),
      makeSummaryLine("Estimated amount", getAmountOption(largestDebt.amount).label || "Not sure"),
      makeSummaryLine("Number of debts", getDebtCountLabel(data.debtCountChoice) || String(data.debts.length)),
      makeSummaryLine("Current stage", getLabel(STAGE_OPTIONS, calc.highestRiskStage) || "Not sure"),
      makeSummaryLine("Secured/unsecured status", unique(data.debts.map(function (d) { return getLabel(SECURITY_OPTIONS, d.security); }).filter(Boolean)).join(", ") || "Not sure"),
      makeSummaryLine("Documents", hasDocumentSignal() ? "Documents may be available" : "No documents reported yet"),
      makeSummaryLine("Collector or creditor", unique(data.debts.map(function (d) { return d.creditorName.trim(); }).filter(Boolean)).join(", ") || "Not provided"),
      makeSummaryLine("State", data.state || "Not provided"),
      makeSummaryLine("Lawsuit, judgment, garnishment, or collector pressure", getMajorIssueSummary(calc))
    ];
  }

  function makeSummaryLine(label, value) {
    return { label: label, value: value };
  }

  function getMajorIssueSummary(calc) {
    var issues = [];
    if (calc.hasLawsuit) issues.push("lawsuit or court papers");
    if (calc.hasDefaultJudgment) issues.push("default judgment");
    if (calc.hasGarnishment) issues.push("garnishment or wage/bank impact");
    if (calc.hasHarassment) issues.push("collector contact pressure");
    return issues.length ? issues.join(", ") : "No major issue selected";
  }

  function generatePriorityExplanation(level) {
    if (level === "Critical") return "Based on your answers, your situation may involve a lawsuit, judgment, garnishment, deadline, or wage/bank impact. These situations can move quickly and may require prompt review.";
    if (level === "High") return "Your answers suggest that collectors may be escalating contact, important documents may need review, or your debt may be moving through an active collection stage.";
    if (level === "Moderate") return "Your debt appears to be active or moving through collections. It may be helpful to review notices, collector behavior, and what options may be available.";
    return "Based on your answers, your situation may still be in an earlier stage. It may be useful to understand your debt type, gather documents, and review your options before the situation escalates.";
  }

  function reportToText(report) {
    var lines = [];
    lines.push("Debt Defense Snapshot");
    lines.push("Snapshot ID: " + report.snapshotId);
    lines.push("Generated: " + report.generatedAtDisplay);
    lines.push("Entry path: " + report.entryPathLabel);
    lines.push("Situation type: " + report.situationType);
    lines.push("Priority Level: " + report.quickSummary.priorityLevel);
    lines.push("Case Readiness: " + report.quickSummary.readinessLevel + " (" + report.quickSummary.readinessScore + "/100)");
    lines.push("");
    lines.push("Situation Summary");
    report.fullSnapshot.situationSummary.forEach(function (item) { lines.push("- " + item.label + ": " + item.value); });
    lines.push("");
    lines.push("Debt Defense Priority Level");
    lines.push(report.fullSnapshot.priority.level + " (" + report.fullSnapshot.priority.score + "/100)");
    lines.push(report.fullSnapshot.priority.explanation);
    lines.push("");
    lines.push("Credo Legal Fit Check");
    lines.push(report.fullSnapshot.fitCheck.status + ": " + report.fullSnapshot.fitCheck.intro);
    report.fullSnapshot.fitCheck.factors.forEach(function (item) { lines.push("- " + item); });
    report.fullSnapshot.fitCheck.concerns.forEach(function (item) { lines.push("- Review note: " + item); });
    lines.push("");
    lines.push("Potential Risk Flags");
    report.fullSnapshot.riskFlags.forEach(function (flag) { lines.push("- " + flag.severity + ": " + flag.title + " - " + flag.explanation); });
    lines.push("");
    lines.push("Collector Behavior Review");
    lines.push(report.fullSnapshot.collectorBehaviorReview.intro);
    report.fullSnapshot.collectorBehaviorReview.selectedBehaviors.forEach(function (item) { lines.push("- " + item); });
    if (report.fullSnapshot.collectorBehaviorReview.explanation) lines.push(report.fullSnapshot.collectorBehaviorReview.explanation);
    lines.push("Collector Call Log Template:");
    report.fullSnapshot.collectorBehaviorReview.callLogTemplate.forEach(function (item) { lines.push("- " + item); });
    lines.push("");
    lines.push("Document Checklist");
    report.fullSnapshot.documentChecklist.forEach(function (item) { lines.push("- " + item); });
    lines.push("");
    lines.push("Case Readiness Scorecard");
    lines.push(report.fullSnapshot.readinessBreakdown.score + "/100 - " + report.fullSnapshot.readinessBreakdown.level);
    lines.push("What helped your score:");
    report.fullSnapshot.readinessBreakdown.helped.forEach(function (item) { lines.push("- " + item); });
    lines.push("What would improve your score:");
    report.fullSnapshot.readinessBreakdown.missing.forEach(function (item) { lines.push("- " + item); });
    lines.push("");
    lines.push("Suggested Next 3 Steps");
    report.fullSnapshot.suggestedNextSteps.forEach(function (item, index) { lines.push((index + 1) + ". " + item); });
    lines.push("");
    lines.push("Common Mistakes to Avoid");
    report.fullSnapshot.commonMistakes.forEach(function (item) { lines.push("- " + item); });
    lines.push("");
    lines.push("Important Disclaimer");
    lines.push(report.fullSnapshot.disclaimer);
    return lines.join("\n");
  }

  function quickSummaryToText(report) {
    var lines = [];
    lines.push("Your Quick Debt Defense Summary");
    lines.push("Snapshot ID: " + report.snapshotId);
    lines.push("Generated: " + report.generatedAtDisplay);
    lines.push("Entry path: " + report.entryPathLabel);
    lines.push("Situation type: " + report.situationType);
    lines.push("Priority: " + report.quickSummary.priorityLevel);
    lines.push("Case Readiness Score: " + report.quickSummary.readinessScore + "/100");
    lines.push("Status: " + report.quickSummary.readinessLevel);
    lines.push("Top 3 Findings:");
    report.quickSummary.topFindings.forEach(function (item) { lines.push("- " + item); });
    lines.push("Recommended next step: " + report.quickSummary.recommendedNextAction);
    return lines.join("\n");
  }

  function getSnapshotDisclaimer() {
    return "This Debt Defense Snapshot is for general intake and informational purposes only. It is not legal advice and does not create an attorney-client relationship. Your exact rights, deadlines, defenses, and options depend on your documents, facts, court, state law, and other circumstances. A qualified legal professional should review your situation before you take action.";
  }

  function formatDateTime(value) {
    var date = new Date(value);
    if (Number.isNaN(date.getTime())) return "";
    try {
      return date.toLocaleString(undefined, { year: "numeric", month: "long", day: "numeric", hour: "numeric", minute: "2-digit" });
    } catch (error) {
      return date.toISOString();
    }
  }

  async function submitLead() {
    var validationError = validateStep(STEP.FOLLOW_UP);
    if (validationError) {
      ui.error = validationError;
      render();
      return;
    }

    ui.submitting = true;
    render();

    var payload = buildPayload();
    var isDemo = !CONFIG.googleScriptUrl || CONFIG.googleScriptUrl.indexOf("PASTE_YOUR") === 0;

    try {
      if (isDemo) {
        console.log("Credo Legal lead payload", payload);
        ui.submittedInDemoMode = true;
      } else {
        await fetch(CONFIG.googleScriptUrl, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
      }
      ui.step = 8;
      ui.error = "";
      trackEvent("submit", { demo_mode: isDemo, qualification_status: payload.qualification_status, urgency_level: payload.urgency_level });
    } catch (error) {
      ui.error = "Something went wrong while submitting the request. Please call " + CONFIG.phoneDisplay + " or try again.";
      console.error(error);
    } finally {
      ui.submitting = false;
      render();
    }
  }

  function buildPayload() {
    var calc = getCalculations();
    var report = generateDebtDefenseReport(calc);
    data.report = report;
    var debtTypeLabels = data.debts.map(function (d) { return getLabel(DEBT_TYPES, d.type); }).filter(Boolean);
    var supportedDebtTypes = unique(data.debts.filter(function (d) { return SUPPORTED_DEBT_KEYS.includes(d.type); }).map(function (d) { return getLabel(DEBT_TYPES, d.type); }));
    var unsupportedDebtTypes = unique(data.debts.filter(function (d) { return UNSUPPORTED_DEBT_KEYS.includes(d.type); }).map(function (d) { return getLabel(DEBT_TYPES, d.type); }));
    var totalEstimate = data.debts.reduce(function (sum, d) { return sum + (getAmountOption(d.amount).estimate || 0); }, 0);
    var largestDebt = data.debts.slice().sort(function (a, b) { return (getAmountOption(b.amount).estimate || 0) - (getAmountOption(a.amount).estimate || 0); })[0] || makeDebt();
    var collectorNames = unique(data.debts.map(function (d) { return d.creditorName.trim(); }).filter(Boolean));
    var urgentBranch = getPayloadUrgentBranch(calc);
    var uploadIntent = data.uploadIntent || data.urgentDocumentsAvailable === "yes" || data.urgentEvents.includes("not_sure_documents") || data.papersAvailable === "yes" || data.enforcementPaperwork === "yes";

    return {
      created_at: new Date().toISOString(),
      lead_id: data.leadId,
      snapshot_id: report.snapshotId,
      widget_version: CONFIG.widgetVersion,
      page_url: safePageUrl(),
      referrer: safeReferrer(),
      entry_path: data.entryPath,
      urgent_branch: urgentBranch,
      urgent_events: data.urgentEvents.map(function (key) { return getLabel(URGENT_TRIAGE_OPTIONS, key); }).filter(Boolean).join(", "),
      situation_type: report.situationType,
      quick_summary_text: quickSummaryToText(report),
      quick_summary_json: JSON.stringify(report.quickSummary),
      full_report_text: report.textVersion,
      full_report_json: JSON.stringify(report.fullSnapshot),
      risk_flags_json: JSON.stringify(report.fullSnapshot.riskFlags),
      document_checklist_json: JSON.stringify(report.fullSnapshot.documentChecklist),
      suggested_next_steps_json: JSON.stringify(report.fullSnapshot.suggestedNextSteps),
      common_mistakes_json: JSON.stringify(report.fullSnapshot.commonMistakes),
      readiness_helped_json: JSON.stringify(report.fullSnapshot.readinessBreakdown.helped),
      readiness_missing_json: JSON.stringify(report.fullSnapshot.readinessBreakdown.missing),
      collector_call_log_template_included: report.fullSnapshot.collectorBehaviorReview.included ? "Yes" : "No",
      full_snapshot_requested: data.fullSnapshotRequested || !!data.deliveryChannel ? "Yes" : "No",
      full_snapshot_delivery_channel: data.deliveryChannel === "sms" ? "sms/text" : data.deliveryChannel,
      actual_delivery_enabled: CONFIG.actualDeliveryEnabled ? "Yes" : "No",
      report_screen_viewed: data.reportScreenViewed ? "Yes" : "No",
      call_cta_clicked: data.callCtaClicked ? "Yes" : "No",
      callback_cta_clicked: data.callbackCtaClicked ? "Yes" : "No",
      send_snapshot_cta_clicked: data.sendSnapshotCtaClicked ? "Yes" : "No",
      first_name: data.firstName.trim(),
      last_name: data.lastName.trim(),
      phone: isValidPhone(data.phone) ? phoneForPayload(data.phone) : "",
      email: isValidEmail(data.email) ? data.email.trim().toLowerCase() : "",
      state: data.state,
      state_name: getStateName(data.state),
      zip: data.zip.trim(),
      delivery_channel: getDeliveryLabel(data.deliveryChannel),
      follow_up_preference: getFollowUpLabel(data.followUpPreference),
      sms_consent: data.deliveryChannel === "sms" && data.smsConsent ? "Yes" : "No",
      whatsapp_consent: data.deliveryChannel === "whatsapp" && data.whatsappConsent ? "Yes" : "No",
      person_type: data.personType,
      authorized_for_other: data.personType === "family" ? data.authorizedForOther : "",

      qualification_status: calc.qualificationStatus,
      qualification_reasons: calc.qualificationReasons.join("; "),
      disqualification_reason: calc.qualificationStatus === "Not a Fit" ? calc.qualificationReasons.join("; ") : "",
      excluded_state_flag: CONFIG.excludedStates.includes(data.state) ? "Yes" : "No",
      individual_or_business: data.personType,
      urgency_score: calc.urgencyScore,
      urgency_level: calc.urgencyLevel,
      readiness_score: calc.readinessScore,
      readiness_level: calc.readinessLevel,
      recommended_next_action: getBranchMessage(calc).nextStep,

      debt_count: getDebtCountLabel(data.debtCountChoice),
      number_of_debts: data.debts.length,
      total_estimated_debt: totalEstimate ? "$" + totalEstimate.toLocaleString() + "+ estimated from ranges" : "Not sure",
      largest_debt_amount: getAmountOption(largestDebt.amount).label,
      supported_debt_types: supportedDebtTypes.join(", "),
      unsupported_debt_types: unsupportedDebtTypes.join(", "),
      debt_types: unique(debtTypeLabels).join(", "),
      all_debt_types: unique(debtTypeLabels).join(", "),
      debt_security: unique(data.debts.map(function (d) { return getLabel(SECURITY_OPTIONS, d.security); }).filter(Boolean)).join(", "),
      debt_stage: getLabel(STAGE_OPTIONS, calc.highestRiskStage),
      lawsuit_or_summons: calc.hasLawsuit ? "Yes" : "No",
      deadline_or_court_date: getLabel(DEADLINE_OPTIONS, data.papersDeadlineStatus || data.deadlineStatus),
      default_judgment: calc.hasDefaultJudgment ? "Yes" : "No",
      garnishment: calc.hasGarnishment ? "Yes" : "No",
      wages_or_bank_affected: calc.hasWagesOrBankAffected ? "Yes" : "No",

      collector_calls: (data.urgentEvents.includes("collector_repeated_calls") || data.behaviors.includes("calling_repeatedly") || data.debts.some(function (d) { return d.stage === "calls"; })) ? "Yes" : "No",
      workplace_calls: (data.urgentEvents.includes("collector_workplace_calls") || data.behaviors.includes("calling_workplace")) ? "Yes" : "No",
      family_or_friend_contact: (data.urgentEvents.includes("collector_third_party_contact") || data.behaviors.includes("contacting_others")) ? "Yes" : "No",
      threats_or_abusive_language: (data.urgentEvents.includes("collector_threats_abusive") || data.behaviors.some(function (x) { return ["threatening", "abusive_language", "threatening_arrest", "threatening_garnishment"].includes(x); })) ? "Yes" : "No",
      collector_behaviors: getCollectorBehaviorLabels().join(", "),
      validation_notice_status: getLabel(VALIDATION_OPTIONS, data.validationNotice),
      has_documents: hasDocumentSignal() ? "Yes" : "No",
      upload_intent: uploadIntent ? "Yes" : "No",
      collector_names: collectorNames.join(", "),
      user_description: data.userDescription.trim(),
      debts_json: JSON.stringify(data.debts.map(function (d, idx) {
        return {
          debt_number: idx + 1,
          type: getLabel(DEBT_TYPES, d.type),
          amount: getAmountOption(d.amount).label,
          security: getLabel(SECURITY_OPTIONS, d.security),
          stage: getLabel(STAGE_OPTIONS, d.stage),
          auto_repossession_status: d.autoRepossessionStatus,
          document_status: getLabel(DOCUMENT_OPTIONS, d.documentStatus),
          creditor_name: d.creditorName.trim()
        };
      })),
      raw_answers_json: JSON.stringify(data)
    };
  }

  function getPayloadUrgentBranch(calc) {
    if (data.entryPath === FLOW_ENTRY.URGENT) return calc.urgentBranch || getUrgentBranch();
    if (calc.hasGarnishment) return "garnishment_or_bank_wage_impact";
    if (calc.hasDefaultJudgment) return "default_judgment";
    if (calc.hasLawsuit) return "lawsuit_or_summons";
    if (calc.hasHarassment) return "collector_harassment";
    return "";
  }

  function getDebtCountLabel(choice) {
    var map = {
      "1": "1 debt",
      "2": "2 debts",
      "3_5": "3-5 debts",
      "6_plus": "6+ debts",
      one: "One debt",
      multiple: "Multiple debts",
      not_sure: "Not sure"
    };
    return map[choice] || "";
  }

  function getCollectorBehaviorLabels() {
    var labels = data.behaviors.map(function (key) { return getLabel(BEHAVIOR_OPTIONS, key); }).filter(Boolean);
    if (!labels.length) {
      var urgentBehaviorMap = {
        collector_repeated_calls: "Calling me repeatedly",
        collector_workplace_calls: "Calling my workplace",
        collector_third_party_contact: "Contacting family, friends, or other people",
        collector_threats_abusive: "Threatening me or using abusive language"
      };
      labels = data.urgentEvents.map(function (key) { return urgentBehaviorMap[key] || ""; }).filter(Boolean);
    }
    return unique(labels);
  }

  function unique(values) {
    return Array.from(new Set(values.filter(Boolean)));
  }

  function safePageUrl() {
    try {
      return window.location.href;
    } catch (error) {
      return "";
    }
  }

  function safeReferrer() {
    try {
      return document.referrer || "";
    } catch (error) {
      return "";
    }
  }

  function getDeliveryLabel(key) {
    var item = DELIVERY_OPTIONS.find(function (x) { return x.key === key; });
    return item ? item.title : "";
  }

  function getFollowUpLabel(key) {
    var item = FOLLOW_UP_OPTIONS.find(function (x) { return x.key === key; });
    return item ? item.title : "";
  }

  function getEntryPathLabel(key) {
    if (key === FLOW_ENTRY.URGENT) return "I Need Urgent Debt Help";
    if (key === FLOW_ENTRY.OPTIONS) return "Check My Debt Defense Options";
    return "";
  }
})();
</script>
