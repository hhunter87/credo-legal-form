  function h(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function getLabel(list, key) {
    var item = list.find(function (x) { return x.key === key; });
    return item ? item.label : "";
  }

  function getStateName(abbr) {
    var item = STATES.find(function (x) { return x[0] === abbr; });
    return item ? item[1] : "";

    return AMOUNT_OPTIONS.find(function (x) { return x.key === key; }) || { label: "", score: 0, estimate: 0 };

    ui.fieldErrors = {};

      ui.fieldErrors[field] = message;

    return message;

  function errorClass(key) {
    return ui.fieldErrors[key] ? " is-invalid" : "";

  function setDataField(field, value) {
    data[field] = value;

    if (field === "personType" && value !== "family") {
      data.authorizedForOther = "";
    }

    if (field === "deliveryChannel") {
      if (value !== "sms") data.smsConsent = false;
      if (value !== "whatsapp") data.whatsappConsent = false;
    }

    if (field === "urgentDocumentsAvailable" && value === "yes") {
      data.uploadIntent = true;
    }
  }

  function setDebtField(index, field, value) {
    if (!data.debts[index]) return;
    data.debts[index][field] = value;

    if (field === "type" && value !== "auto_repossession") {
      data.debts[index].autoRepossessionStatus = "";
    }
  }

  function shouldRerenderAfterInput(el, field, isDebtField) {
    if (el.tagName !== "SELECT") return false;
    if (isDebtField) return ["type", "stage", "documentStatus", "security", "autoRepossessionStatus"].includes(field);
    return [
      "state",
      "deadlineStatus",
      "validationNotice",
      "papersAvailable",
      "urgentDocumentsAvailable",
      "deliveryChannel",
      "followUpPreference"
    ].includes(field);
  }

  function resetWidget() {
    cancelReportLoaderTimers();
    ui.step = 0;
    ui.error = "";
    ui.fieldErrors = {};
    ui.submitting = false;
    ui.submittedInDemoMode = false;
    ui.reportLoaderActive = false;
    ui.reportLoaderStepIndex = 0;
    ui.reportLoaderSteps = [];
    data = makeInitialData();
    trackEvent("reset", {});
    render();
  }

  function trackEvent(name, detail) {
    if (!CONFIG.tracking || !CONFIG.tracking.enabled || typeof window === "undefined") return;
    var layer = window[CONFIG.tracking.dataLayerName];
    if (!Array.isArray(layer)) return;
    layer.push({
      event: CONFIG.tracking.eventPrefix + name,
      widget_version: CONFIG.widgetVersion,
      lead_id: data.leadId,
      detail: detail || {}
    });
  }

  function currentFlowSteps() {
    return FLOW_STEPS[data.entryPath] || [STEP.ENTRY];
  }

  function currentStepId() {
    var steps = currentFlowSteps();
    return steps[ui.step] || STEP.ENTRY;
  }

  function goToStep(stepId) {
    var steps = currentFlowSteps();
    var index = steps.indexOf(stepId);
    ui.step = index >= 0 ? index : 0;
  }

  function startFlow(entryPath) {
    cancelReportLoaderTimers();
    var leadId = data.leadId;
    data = makeInitialData();
    data.leadId = leadId;
    data.entryPath = entryPath;
    ui.reportLoaderActive = false;
    ui.reportLoaderStepIndex = 0;
    ui.reportLoaderSteps = [];
    ui.step = 1;
    ui.error = "";
    ui.fieldErrors = {};
    trackEvent("start_flow", { entry_path: entryPath });
    render();
  }

  function handleClick(event) {
    var el = event.target.closest("[data-action]");
    if (!el || !root.contains(el)) return;

    var action = el.getAttribute("data-action");
    clearErrors();

    if (action === "select") {
      setDataField(el.getAttribute("data-field"), el.getAttribute("data-value"));
      render();
      return;
    }

    if (action === "start-flow") {
      startFlow(el.getAttribute("data-entry-path"));
      return;
    }

    if (action === "toggle-array") {
      toggleArrayValue(el.getAttribute("data-field"), el.getAttribute("data-value"));
      render();
      return;
    }

    if (action === "set-debt-count") {
      setDebtCount(el.getAttribute("data-value"));
      render();
      return;
    }

    if (action === "choose-urgent-cta") {
      var followUp = el.getAttribute("data-follow-up");
      var delivery = el.getAttribute("data-delivery");
      if (followUp) data.followUpPreference = followUp;
      if (delivery) setDataField("deliveryChannel", delivery);
      data.fullSnapshotRequested = true;
      data.callbackCtaClicked = !!followUp || data.callbackCtaClicked;
      data.sendSnapshotCtaClicked = !!delivery || data.sendSnapshotCtaClicked;
      goToStep(STEP.DELIVERY);
      trackEvent("urgent_cta", { follow_up_preference: followUp || "", delivery_channel: delivery || "" });
      render();
      return;
    }

    if (action === "report-call") {
      trackReportCtaClick("call_now");
      return;
    }

    if (action === "send-snapshot") {
      scrollToDeliveryCapture();
      render();
      return;
    }

    if (action === "request-callback") {
      var requestedFollowUp = el.getAttribute("data-follow-up") || callbackFollowUpKey();
      data.followUpPreference = requestedFollowUp;
      setDataField("deliveryChannel", "call");
      data.fullSnapshotRequested = true;
      trackReportCtaClick("request_callback");
      goToStep(STEP.DELIVERY);
      render();
      return;
    }

    if (action === "add-debt") {
      if (data.debts.length >= CONFIG.maxDebtCards) {
        ui.error = "You can include up to " + CONFIG.maxDebtCards + " debts in this widget. If you have more, start with the highest-priority debts and mention the rest in the notes.";
        render();
        return;
      }
      data.debts.push(makeDebt());
      data.debtCountChoice = data.debts.length >= 6 ? "6_plus" : String(data.debts.length);
      trackEvent("add_debt", { debt_count: data.debts.length });
      render();
      return;
    }

    if (action === "remove-debt") {
      var index = Number(el.getAttribute("data-index"));
      if (data.debts.length > 1) {
        data.debts.splice(index, 1);
        data.debtCountChoice = data.debts.length >= 6 ? "6_plus" : String(data.debts.length);
        trackEvent("remove_debt", { debt_count: data.debts.length });
      }
      render();
      return;
    }

    if (action === "upload-intent") {
      data.uploadIntent = true;
      trackEvent("upload_placeholder_selected", {});
      render();
      return;
    }

    if (action === "reset") {
      resetWidget();
      return;
    }

    if (action === "prev") {
      cancelReportLoaderTimers();
      ui.reportLoaderActive = false;
      ui.step = Math.max(0, ui.step - 1);
      trackEvent("previous_step", { step: ui.step, step_id: currentStepId(), entry_path: data.entryPath });
      render();
      return;
    }

    if (action === "next") {
      var currentId = currentStepId();
      var validationError = validateStep(currentId);
      if (validationError) {
        ui.error = validationError;
        render();
        return;
      }
      if (isAssessmentToResultsTransition(currentId)) {
        prepareReportData(true);
      }
      if (currentId === STEP.URGENT_RESULTS || currentId === STEP.OPTIONS_RESULTS) {
        data.fullSnapshotRequested = true;
      }
      ui.step = Math.min(currentFlowSteps().length - 1, ui.step + 1);
      trackEvent("next_step", { step: ui.step, step_id: currentStepId(), entry_path: data.entryPath });
      render();
      return;
    }

    if (action === "submit") {
      submitLead();
    }
  }

  function handleInput(event) {
    var el = event.target;
    if (!el || !root.contains(el)) return;
    var shouldRender = false;
    var hadError = !!ui.error || Object.keys(ui.fieldErrors).length > 0;
    ui.error = "";

    if (el.hasAttribute("data-field")) {
      var field = el.getAttribute("data-field");
      if (el.type === "checkbox") {
        setDataField(field, el.checked);
      } else {
        setDataField(field, el.value);
      }
      shouldRender = shouldRerenderAfterInput(el, field, false);
    }

    if (el.hasAttribute("data-debt-field")) {
      var index = Number(el.getAttribute("data-index"));
      var debtField = el.getAttribute("data-debt-field");
      setDebtField(index, debtField, el.value);
      shouldRender = shouldRender || shouldRerenderAfterInput(el, debtField, true);
    }

    ui.fieldErrors = {};
    if (shouldRender || hadError) render();
  }

  function toggleArrayValue(field, value) {
    if (!Array.isArray(data[field])) data[field] = [];
    if (field === "urgentEvents") {
      if (value === "none_not_sure") {
        data[field] = data[field].includes(value) ? [] : [value];
      } else {
        data[field] = data[field].filter(function (x) { return x !== "none_not_sure"; });
        if (data[field].includes(value)) {
          data[field] = data[field].filter(function (x) { return x !== value; });
        } else {
          data[field].push(value);
        }
      }
      data.urgentBranch = getUrgentBranch();
      return;
    }
    if (value === "none_of_these" || value === "letters_only") {
      data[field] = data[field].includes(value) ? [] : [value];
      return;
    }
    data[field] = data[field].filter(function (x) { return !["none_of_these", "letters_only"].includes(x); });
    if (data[field].includes(value)) {
      data[field] = data[field].filter(function (x) { return x !== value; });
    } else {
      data[field].push(value);
    }
  }

  function setDebtCount(choice) {
    data.debtCountChoice = choice;
    var target = Number(choice);
    if (choice === "3_5") target = 3;
    if (choice === "6_plus") target = 6;
    if (choice === "not_sure" || choice === "one" || choice === "multiple") target = 1;
    target = Math.min(target, CONFIG.maxDebtCards);
    while (data.debts.length < target) data.debts.push(makeDebt());
    while (data.debts.length > target) data.debts.pop();
  }

  function validateStep(stepId) {
    ui.fieldErrors = {};

    if (stepId === STEP.ENTRY && !data.entryPath) return markInvalid("Choose one option to start.", ["entryPath"]);

    if (stepId === STEP.URGENT_ELIGIBILITY || stepId === STEP.OPTIONS_ELIGIBILITY) {
      if (!data.state) return markInvalid("Select your state.", ["state"]);
      if (data.zip.trim() && !/^\d{5}$/.test(data.zip.trim())) return markInvalid("Enter a 5-digit ZIP code or leave ZIP blank.", ["zip"]);
      if (!data.personType) return markInvalid("Tell us who this debt help is for.", ["personType"]);
      if (data.personType === "family" && !data.authorizedForOther) return markInvalid("Please confirm whether you are authorized to speak for the other person.", ["authorizedForOther"]);
    }

    if (stepId === STEP.URGENT_TRIAGE && !data.urgentEvents.length) {
      return markInvalid("Select what is happening right now, or choose 'None of these / I am not sure.'", ["urgentEvents"]);
    }

    if (stepId === STEP.URGENT_BRANCH_DETAILS) {
      var branch = getUrgentBranch();
      if (branch === "lawsuit_or_summons") {
        if (!data.papersReceivedWhen) return markInvalid("Select when you received the papers.", ["papersReceivedWhen"]);
        if (!data.papersDeadlineStatus) return markInvalid("Select whether the papers mention a deadline, court date, or hearing date.", ["papersDeadlineStatus"]);
        if (!data.papersAvailable) return markInvalid("Select whether you have the papers available.", ["papersAvailable"]);
      }
      if (branch === "default_judgment") {
        if (!data.judgmentCopyAvailable) return markInvalid("Select whether you have a copy of the judgment.", ["judgmentCopyAvailable"]);
        if (!data.judgmentEnteredWhen) return markInvalid("Select whether you know when the judgment was entered.", ["judgmentEnteredWhen"]);
        if (!data.judgmentWagesBankAffected) return markInvalid("Select whether wages or bank accounts are already being affected.", ["judgmentWagesBankAffected"]);
      }
      if (branch === "garnishment_or_bank_wage_impact") {
        if (!data.wagesBeingGarnished) return markInvalid("Select whether wages are being garnished.", ["wagesBeingGarnished"]);
        if (!data.bankAccountAffected) return markInvalid("Select whether a bank account is affected.", ["bankAccountAffected"]);
        if (!data.enforcementPaperwork) return markInvalid("Select whether you have paperwork from a court, employer, bank, or collector.", ["enforcementPaperwork"]);
      }
      if (branch === "collector_harassment" && !data.behaviors.length) {
        return markInvalid("Select collector behavior details, or choose letters/notices only.", ["behaviors"]);
      }
      if (branch === "not_sure_document_review" && !data.urgentDocumentsAvailable) {
        return markInvalid("Select whether you have documents available.", ["urgentDocumentsAvailable"]);
      }
      if (data.userDescription.trim().length > CONFIG.maxDescriptionChars) {
        return markInvalid("Keep the description under " + CONFIG.maxDescriptionChars + " characters.", ["userDescription"]);
      }
    }

    if (stepId === STEP.URGENT_COMPACT_QUALIFICATION) {
      var urgentDebt = data.debts[0] || makeDebt();
      if (!urgentDebt.type) return markInvalid("Select the debt type involved.", [debtFieldKey(0, "type")]);
      if (!urgentDebt.security) return markInvalid("Select whether the debt is unsecured.", [debtFieldKey(0, "security")]);
      if (!urgentDebt.amount) return markInvalid("Select the approximate amount.", [debtFieldKey(0, "amount")]);
      if (!data.debtCountChoice) return markInvalid("Select whether this is one debt, multiple debts, or not sure.", ["debtCountChoice"]);
      if (urgentDebt.type === "auto_repossession" && !urgentDebt.autoRepossessionStatus) {
        return markInvalid("For Auto Repossession, tell us whether the vehicle was already repossessed.", [debtFieldKey(0, "autoRepossessionStatus")]);
      }
    }

    if (stepId === STEP.OPTIONS_DEBT_COUNT && !data.debtCountChoice) return markInvalid("Select how many debts you want to include.", ["debtCountChoice"]);

    if (stepId === STEP.OPTIONS_DEBT_DETAILS) {
      for (var i = 0; i < data.debts.length; i += 1) {
        var debt = data.debts[i];
        if (!debt.type) return markInvalid("Select a debt type for Debt #" + (i + 1) + ".", [debtFieldKey(i, "type")]);
        if (!debt.amount) return markInvalid("Select an approximate amount for Debt #" + (i + 1) + ".", [debtFieldKey(i, "amount")]);
        if (!debt.security) return markInvalid("Select whether Debt #" + (i + 1) + " is secured or unsecured.", [debtFieldKey(i, "security")]);
        if (!debt.stage) return markInvalid("Select the current stage for Debt #" + (i + 1) + ".", [debtFieldKey(i, "stage")]);
        if (debt.type === "auto_repossession" && !debt.autoRepossessionStatus) {
          return markInvalid("For Auto Repossession on Debt #" + (i + 1) + ", tell us whether the vehicle was already repossessed.", [debtFieldKey(i, "autoRepossessionStatus")]);
        }
        if (!debt.documentStatus) return markInvalid("Select whether you have documents for Debt #" + (i + 1) + ".", [debtFieldKey(i, "documentStatus")]);
      }
    }

    if (stepId === STEP.OPTIONS_URGENCY_DETAILS) {
      if (!data.deadlineStatus) return markInvalid("Select whether any papers mention a deadline, court date, hearing, judgment, or garnishment.", ["deadlineStatus"]);
      if (!data.validationNotice) return markInvalid("Select whether you received a debt validation notice.", ["validationNotice"]);
      if (!data.behaviors.length) return markInvalid("Select what collectors are doing, or choose 'None of these.'", ["behaviors"]);
      if (data.userDescription.trim().length > CONFIG.maxDescriptionChars) {
        return markInvalid("Keep the description under " + CONFIG.maxDescriptionChars + " characters.", ["userDescription"]);
      }
    }

    if (stepId === STEP.DELIVERY) {
      if (!data.deliveryChannel) return markInvalid("Choose where we should send your Full Debt Defense Snapshot.", ["deliveryChannel"]);
      if (!data.firstName.trim()) return markInvalid("Enter your first name.", ["firstName"]);
      if (!data.lastName.trim()) return markInvalid("Enter your last name.", ["lastName"]);
      if (["sms", "whatsapp", "call"].includes(data.deliveryChannel) && !isValidPhone(data.phone)) {
        return markInvalid("Enter a valid US phone number.", ["phone"]);
      }
      if (data.deliveryChannel === "email" && !isValidEmail(data.email)) return markInvalid("Enter a valid email address.", ["email"]);
      if (data.deliveryChannel === "sms" && !data.smsConsent) return markInvalid("Please accept the SMS consent to receive your Snapshot by text message.", ["smsConsent"]);
      if (data.deliveryChannel === "whatsapp" && !data.whatsappConsent) return markInvalid("Please accept the WhatsApp consent to receive your Snapshot by WhatsApp.", ["whatsappConsent"]);
    }

    if (stepId === STEP.FOLLOW_UP) {
      if (!data.followUpPreference) return markInvalid("Choose a follow-up preference.", ["followUpPreference"]);
      if (followUpNeedsPhone(data.followUpPreference) && !isValidPhone(data.phone)) {
        return markInvalid("Enter a valid phone number so the team can follow up by phone or message.", ["phone"]);
      }
      if (data.followUpPreference === "email_first" && !isValidEmail(data.email)) return markInvalid("Enter a valid email address for email follow-up.", ["email"]);
    }

    return "";
  }

  function isValidEmail(value) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value || "").trim());
  }

  function normalizePhone(value) {
    var digits = String(value || "").replace(/\D/g, "");
    if (digits.length === 11 && digits.charAt(0) === "1") digits = digits.slice(1);
    return digits;
  }

  function isValidPhone(value) {
    return normalizePhone(value).length === 10;
  }

  function phoneForPayload(value) {
    var digits = normalizePhone(value);
    return digits.length === 10 ? "+1" + digits : String(value || "").trim();
  }

  function followUpNeedsPhone(key) {
    return FOLLOW_UP_PHONE_KEYS.includes(key);
  }

    if (stepId === STEP.URGENT_BRANCH_DETAILS) content = renderUrgentBranchDetails();
    if (stepId === STEP.URGENT_COMPACT_QUALIFICATION) content = renderUrgentCompactQualification();
    if (stepId === STEP.OPTIONS_DEBT_COUNT) content = renderDebtCount();
    if (stepId === STEP.OPTIONS_DEBT_DETAILS) content = renderDebtDetails();
    if (stepId === STEP.OPTIONS_URGENCY_DETAILS) content = renderUrgencyDetails();
    if (stepId === STEP.URGENT_RESULTS || stepId === STEP.OPTIONS_RESULTS) content = renderResults();
    if (stepId === STEP.DELIVERY) content = renderDelivery();
    if (stepId === STEP.FOLLOW_UP) content = renderFollowUp();
    if (stepId === STEP.THANK_YOU) content = renderThankYou();

    root.innerHTML = [

        '<div class="cl-card">',

          stepId !== STEP.THANK_YOU ? renderProgress() : '',

  function renderProgress() {

    var visibleStep = Math.min(Math.max(steps.indexOf(stepId) + 1, 1), steps.length);

    return [
      '<div class="cl-progress-wrap">',
        '<div class="cl-progress-meta">',
          '<span>' + h(STEP_LABELS[stepId] || "") + '</span>',

  function renderResults() {

      return renderReportPreparationFallback();
    }
    var calc = prepared.calc;
    var report = prepared.report;
    if (shouldShowReportLoader()) {
      startReportLoaderThenRenderReport(calc);
      return renderReportLoader(ui.reportLoaderSteps, calc);
    }
    if (!data.reportScreenViewed) {
      data.reportScreenViewed = true;
      trackEvent("report_screen_viewed", {

  function isAssessmentToResultsTransition(stepId) {
    return stepId === STEP.URGENT_COMPACT_QUALIFICATION || stepId === STEP.OPTIONS_URGENCY_DETAILS;
  }

  function prepareReportData(force) {
    if (force || !data.report || !data.scores) {
      var calc = getCalculations();
      data.scores = calc;
      data.report = generateDebtDefenseReport(calc);
    }
    return {
      calc: data.scores || getCalculations(),
      report: data.report || generateDebtDefenseReport(data.scores || getCalculations())
    };
  }

  function shouldShowReportLoader() {
    if (!CONFIG.reportLoaderEnabled) return false;
    if (data.reportLoaderShown) return ui.reportLoaderActive;
    return currentStepId() === STEP.URGENT_RESULTS || currentStepId() === STEP.OPTIONS_RESULTS;
  }

  function startReportLoaderThenRenderReport(calc) {
    if (ui.reportLoaderActive) return;
    var duration = getReportLoaderDuration();
    var maxDuration = getReportLoaderMaxDuration();
    ui.reportLoaderActive = true;
    ui.reportLoaderStepIndex = 0;
    ui.reportLoaderSteps = getReportLoaderSteps(calc);
    data.reportLoaderShown = true;
    trackEvent("report_loader_start", {
      entry_path: data.entryPath,
      urgency_level: calc.urgencyLevel,
      qualification_status: calc.qualificationStatus
    });
    scheduleReportLoaderStepUpdates(duration);
    ui.reportLoaderTimer = setSafeTimeout(completeReportLoader, duration);
    ui.reportLoaderFallbackTimer = setSafeTimeout(completeReportLoader, maxDuration);
  }

  function completeReportLoader() {
    if (!ui.reportLoaderActive) return;
    cancelReportLoaderTimers();
    ui.reportLoaderActive = false;
    ui.reportLoaderStepIndex = Math.max(0, (ui.reportLoaderSteps || []).length - 1);
    trackEvent("report_loader_complete", {
      entry_path: data.entryPath,
      snapshot_id: data.snapshotId
    });
    render();
  }

  function scheduleReportLoaderStepUpdates(duration) {
    var steps = ui.reportLoaderSteps || [];
    if (!steps.length) return;
    var stepMs = Math.max(300, Math.floor(duration / steps.length));
    ui.reportLoaderStepTimers = [];
    steps.forEach(function (_step, index) {
      if (index === 0) return;
      ui.reportLoaderStepTimers.push(setSafeTimeout(function () {
        if (!ui.reportLoaderActive) return;
        ui.reportLoaderStepIndex = index;
        updateReportLoaderStep(index);
      }, stepMs * index));
    });
  }

  function updateReportLoaderStep(index) {
    if (!root || typeof root.querySelector !== "function") return;
    var steps = root.querySelectorAll("[data-loader-step]");
    var status = root.querySelector("[data-loader-status]");
    var progress = root.querySelector("[data-loader-progress]");
    var progressValue = Math.round(((index + 1) / Math.max(1, steps.length)) * 100);
    steps.forEach(function (item, itemIndex) {
      item.classList.toggle("is-complete", itemIndex < index);
      item.classList.toggle("is-active", itemIndex === index);
      item.classList.toggle("is-pending", itemIndex > index);
      var icon = item.querySelector("[data-loader-icon]");
      if (icon) icon.innerHTML = itemIndex < index ? "&#10003;" : itemIndex === index ? "..." : "";
    });
    if (status && ui.reportLoaderSteps[index]) status.textContent = ui.reportLoaderSteps[index];
    if (progress) progress.setAttribute("aria-valuenow", String(progressValue));
  }

  function cancelReportLoaderTimers() {
    if (ui.reportLoaderTimer) clearSafeTimeout(ui.reportLoaderTimer);
    if (ui.reportLoaderFallbackTimer) clearSafeTimeout(ui.reportLoaderFallbackTimer);
    (ui.reportLoaderStepTimers || []).forEach(clearSafeTimeout);
    ui.reportLoaderTimer = null;
    ui.reportLoaderFallbackTimer = null;
    ui.reportLoaderStepTimers = [];
  }

  function setSafeTimeout(callback, delay) {
    var timerFn = typeof window !== "undefined" && window.setTimeout ? window.setTimeout.bind(window) : setTimeout;
    return timerFn(callback, delay);
  }

  function clearSafeTimeout(timer) {
    var clearFn = typeof window !== "undefined" && window.clearTimeout ? window.clearTimeout.bind(window) : clearTimeout;
    clearFn(timer);
  }

  function getReportLoaderDuration() {
    var duration = Number(CONFIG.reportLoaderDurationMs) || 4600;
    return Math.max(1000, Math.min(duration, getReportLoaderMaxDuration()));
  }

  function getReportLoaderMaxDuration() {
    return Math.max(1500, Number(CONFIG.reportLoaderMaxDurationMs) || 7000);
  }

  function renderReportLoader(steps, calc) {
    var list = steps && steps.length ? steps : getReportLoaderSteps(calc);
    var activeIndex = Math.min(ui.reportLoaderStepIndex || 0, list.length - 1);
    var activeStep = list[activeIndex] || "Preparing your Debt Defense Snapshot...";
    var progressValue = Math.round(((activeIndex + 1) / Math.max(1, list.length)) * 100);
    return [
      '<section class="cl-loader-screen" aria-label="Debt Defense Snapshot preparation">',
        '<div class="cl-loader-card">',
          '<img class="cl-loader-logo" src="' + h(CONFIG.logoUrl) + '" alt="Credo Legal" onerror="this.style.display=\'none\';">',
          '<div class="cl-eyebrow">Debt Defense Snapshot</div>',
          '<h2>Preparing Your Debt Defense Snapshot</h2>',
          '<p>' + h(getReportLoaderSubtitle(calc)) + '</p>',
          '<div class="cl-loader-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="' + h(progressValue) + '" data-loader-progress>',
            '<span style="--cl-loader-duration:' + h(getReportLoaderDuration()) + 'ms;"></span>',
          '</div>',
          '<div class="cl-loader-status" aria-live="polite" data-loader-status>' + h(activeStep) + '</div>',
          '<ul class="cl-loader-steps">',
            list.map(function (step, index) {
              var state = index < activeIndex ? "is-complete" : index === activeIndex ? "is-active" : "is-pending";
              var icon = index < activeIndex ? "&#10003;" : index === activeIndex ? "..." : "";
              return '<li class="cl-loader-step ' + state + '" data-loader-step><span class="cl-loader-check" data-loader-icon>' + icon + '</span><span>' + h(step) + '</span></li>';
            }).join(""),
          '</ul>',
          '<div class="cl-loader-note">' + h(getReportLoaderNote(calc)) + '</div>',
          '<div class="cl-disclaimer">This is for general intake and informational purposes only. It is not legal advice and does not create an attorney-client relationship.</div>',
        '</div>',
      '</section>'
    ].join("");
  }

  function getReportLoaderSteps(calc) {
    if (calc.qualificationStatus === "Not a Fit") {
      return [

        "Checking debt type and intake fit...",
        "Organizing the information you provided...",
        "Preparing a summary of the information you provided...",
        "Finalizing your Debt Defense Snapshot..."

    }
    if (calc.hasGarnishment || calc.hasWagesOrBankAffected) {
      return [

        "Identifying time-sensitive red flags...",
        "Building your priority level...",
        "Preparing your document checklist...",
        "Finalizing your Debt Defense Snapshot..."

    if (calc.hasLawsuit) {

        "Checking for court paper and deadline indicators...",
        "Identifying time-sensitive red flags...",
        "Building your priority level...",
        "Preparing your document checklist...",
        "Finalizing your Debt Defense Snapshot..."
      ];
    }
    if (calc.hasHarassment) {
      return [
        "Reviewing collector contact patterns...",
        "Checking debt type and collection stage...",
        "Identifying possible contact-related risk flags...",
        "Building your Case Readiness Score...",
        "Preparing your call log checklist...",
        "Finalizing your Debt Defense Snapshot..."
      ];
    }
    if (data.entryPath === FLOW_ENTRY.URGENT) {
      if (calc.urgentBranch === "not_sure_document_review") {
        return [
          "Reviewing your urgent debt-help answers...",
          "Organizing your document-review checklist...",
          "Identifying possible risk flags based on your answers...",
          "Building your priority level...",
          "Preparing your document checklist...",
          "Finalizing your Debt Defense Snapshot..."
        ];
      }
      return [
        "Reviewing your urgent debt-help answers...",
        "Checking for lawsuit, judgment, garnishment, or deadline indicators...",
        "Identifying time-sensitive red flags...",
        "Building your priority level...",
        "Preparing your document checklist...",
        "Finalizing your Debt Defense Snapshot..."
      ];
    }
    return [
      "Reviewing your intake answers...",
      "Checking debt type and collection stage...",
      "Identifying possible risk flags...",
      "Building your Case Readiness Score...",
      "Preparing your document checklist...",
      "Finalizing your Debt Defense Snapshot..."
    ];
  }

    }

        body: "Based on your answers, your situation appears to involve active collection pressure or documents that may need review. Credo Legal can walk you through this Snapshot and explain what information may matter."

    if (calc.urgencyLevel === "High") return "Your answers suggest collectors may be escalating contact or important documents may need review.";
    if (calc.urgencyLevel === "Moderate") return "Your debt appears active or moving through collections based on the information selected.";

  function getPrimaryRiskFlag(report, calc) {
    if (calc.qualificationStatus === "Not a Fit") {
      return {
        badge: "Fit Warning",
        title: "Not a Fit for Credo Legal Intake",
        explanation: "Based on your answers, this may not fit the type of debt matters Credo Legal currently reviews. This Snapshot can still help organize the information you may need when seeking the right type of help."
      };
    }
    if (calc.hasLawsuit) {
      return {
        badge: "Court Paper Warning",
        title: "Lawsuit or Court Papers",
        explanation: "You indicated that a lawsuit, summons, or court papers may be involved. Court papers should not be ignored. A response deadline may apply, depending on the documents and court."
      };
    }
    if (calc.hasGarnishment) {
      return {
        badge: "Garnishment Warning",
        title: "Garnishment or Wage/Bank Impact",
        explanation: "You indicated that wages or bank funds may already be affected. This may be an active collection enforcement issue and may require prompt review."
      };
    }
    if (calc.hasDefaultJudgment) {
      return {
        badge: "Potential Risk Flag",
        title: "Default Judgment Mentioned",
        explanation: "A judgment may give collectors stronger collection tools depending on the court order and state law. The judgment document and any collection notices may need review."
      };
    }
    if (calc.hasHarassment) {
      return {
        badge: "Collector Contact Pressure",
        title: "Collector Contact Pressure",
        explanation: "You indicated that collectors may be calling repeatedly, contacting your workplace, contacting other people, or using pressure tactics. Certain abusive, deceptive, or unfair collection practices may be restricted. The details may matter."
      };
    }
    if (report.situationType === "Document Review Recommended") {
      return {
        badge: "Document Review Recommended",
        title: "Documents May Need Review",
        explanation: "You indicated that documents may exist but the situation may be hard to classify. Letters, notices, summons, judgments, or garnishment papers may change the assessment."
      };
    }
    var validationFlag = findRiskFlag(report, "Validation Notice Window");
    if (validationFlag) {
      return {
        badge: "Potential Risk Flag",
        title: validationFlag.title,
        explanation: validationFlag.explanation
      };
    }
    var firstFlag = (report.fullSnapshot.riskFlags || [])[0];
    return {
      badge: firstFlag && firstFlag.severity !== "Low" ? "Potential Risk Flag" : "No Major Risk Flag",
      title: firstFlag ? firstFlag.title : "No major red flags were identified from your answers",
      explanation: firstFlag ? firstFlag.explanation : "No major red flags were identified from your answers, but your documents and exact facts may change the assessment."
    };
  }

  function findRiskFlag(report, title) {
    return (report.fullSnapshot.riskFlags || []).find(function (flag) { return flag.title === title; });
  }

  function getQuickPrepareItems(report, calc) {

    if (calc.hasGarnishment || calc.hasWagesOrBankAffected) items = items.concat(["Garnishment notice", "Employer notice", "Bank notice", "Court order, if available"]);
    if (calc.hasDefaultJudgment) items = items.concat(["Judgment document", "Court name", "Date judgment was entered", "Any notice from court or collector"]);
    if (calc.hasHarassment) items = items.concat(["Call logs, voicemails, texts, or letters", "Call dates, phone numbers, and names of anyone contacted"]);
    items = items.concat([
      "Collector or creditor name",
      "Approximate balance and account details",
      "Any collection letters, notices, texts, voicemails, or emails",
      "Call dates, phone numbers, and names of anyone contacted"
    ]);
    return unique(items).slice(0, 6);
  }
