  var FOLLOW_UP_OPTIONS_URGENT = [
    { key: "call_now", title: "Call me now", text: "I can speak as soon as possible." },
    { key: "immediate_callback", title: "Request an immediate callback", text: "Please prioritize my request." },
    { key: "call_today", title: "Call me today", text: "Today works for a call." },
    { key: "message_first", title: "Message me first", text: "Send a message first." }
  ];

  var root = document.getElementById("credo-debt-defense-widget");
  if (!root) return;

  var ui = {
    step: 0,
    error: "",
    submitting: false,
    submittedInDemoMode: false
  };

  var data = {
    leadId: makeLeadId(),
    entryPath: "",
    state: "",
    zip: "",
    personType: "",
    authorizedForOther: "",
    debtCountChoice: "",
    debts: [makeDebt()],
    deadlineStatus: "",
    validationNotice: "",
    behaviors: [],
    userDescription: "",
    uploadIntent: false,
    deliveryChannel: "",
    firstName: "",
    lastName: "",
    phone: "",
    email: "",
    smsConsent: false,
    whatsappConsent: false,
    followUpPreference: ""
  };

  root.addEventListener("click", handleClick);
  root.addEventListener("input", handleInput);
  root.addEventListener("change", handleInput);

  render();

  function makeLeadId() {
    var randomPart = Math.random().toString(36).slice(2, 8).toUpperCase();
    return "CL-" + Date.now().toString(36).toUpperCase() + "-" + randomPart;
  }

  function makeDebt() {
    return {
      type: "",
      amount: "",
      security: "",
      stage: "",
      autoRepossessionStatus: "",
      documentStatus: "",
      creditorName: ""
    };
  }

  function h(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function getLabel(list, key) {
    var item = list.find(function (x) { return x.key === key; });
    return item ? item.label : "";
  }

  function getStateName(abbr) {
    var item = STATES.find(function (x) { return x[0] === abbr; });
    return item ? item[1] : "";
  }

  function getAmountOption(key) {
    return AMOUNT_OPTIONS.find(function (x) { return x.key === key; }) || { label: "", score: 0, estimate: 0 };
  }

  function handleClick(event) {
    var el = event.target.closest("[data-action]");
    if (!el || !root.contains(el)) return;

    var action = el.getAttribute("data-action");
    ui.error = "";

    if (action === "select") {
      data[el.getAttribute("data-field")] = el.getAttribute("data-value");
      render();
      return;
    }

    if (action === "toggle-array") {
      toggleArrayValue(el.getAttribute("data-field"), el.getAttribute("data-value"));
      render();
      return;
    }

    if (action === "set-debt-count") {
      setDebtCount(el.getAttribute("data-value"));
      render();
      return;
    }

    if (action === "add-debt") {
      data.debts.push(makeDebt());
      data.debtCountChoice = data.debts.length >= 6 ? "6_plus" : String(data.debts.length);
      render();
      return;
    }

    if (action === "remove-debt") {
      var index = Number(el.getAttribute("data-index"));
      if (data.debts.length > 1) {
        data.debts.splice(index, 1);
        data.debtCountChoice = data.debts.length >= 6 ? "6_plus" : String(data.debts.length);
      }
      render();
      return;
    }

    if (action === "upload-intent") {
      data.uploadIntent = true;
      render();
      return;
    }

    if (action === "prev") {
      ui.step = Math.max(0, ui.step - 1);
      render();
      return;
    }

    if (action === "next") {
      var validationError = validateStep(ui.step);
      if (validationError) {
        ui.error = validationError;
        render();
        return;
      }
      ui.step = Math.min(8, ui.step + 1);
      render();
      return;
    }

    if (action === "submit") {
      submitLead();
    }
  }

  function handleInput(event) {
    var el = event.target;
    if (!el || !root.contains(el)) return;

    if (el.hasAttribute("data-field")) {
      var field = el.getAttribute("data-field");
      if (el.type === "checkbox") {
        data[field] = el.checked;
      } else {
        data[field] = el.value;
      }
    }

    if (el.hasAttribute("data-debt-field")) {
      var index = Number(el.getAttribute("data-index"));
      var debtField = el.getAttribute("data-debt-field");
      if (data.debts[index]) {
        data.debts[index][debtField] = el.value;
        if (debtField === "type" && el.value !== "auto_repossession") {
          data.debts[index].autoRepossessionStatus = "";
        }
      }
    }
  }

  function toggleArrayValue(field, value) {
    if (!Array.isArray(data[field])) data[field] = [];
    if (value === "none_of_these") {
      data[field] = data[field].includes(value) ? [] : [value];
      return;
    }
    data[field] = data[field].filter(function (x) { return x !== "none_of_these"; });
    if (data[field].includes(value)) {
      data[field] = data[field].filter(function (x) { return x !== value; });
    } else {
      data[field].push(value);
    }
  }

  function setDebtCount(choice) {
    data.debtCountChoice = choice;
    var target = choice === "6_plus" ? 6 : Number(choice);
    while (data.debts.length < target) data.debts.push(makeDebt());
    while (data.debts.length > target) data.debts.pop();
  }

  function validateStep(step) {
    if (step === 0 && !data.entryPath) return "Choose one option to start.";

    if (step === 1) {
      if (!data.state) return "Select your state.";
      if (!data.personType) return "Tell us who this debt help is for.";
      if (data.personType === "family" && !data.authorizedForOther) return "Please confirm whether you are authorized to speak for the other person.";
    }

    if (step === 2 && !data.debtCountChoice) return "Select how many debts you want to include.";

    if (step === 3) {
      for (var i = 0; i < data.debts.length; i += 1) {
        var debt = data.debts[i];
        if (!debt.type) return "Select a debt type for Debt #" + (i + 1) + ".";
        if (!debt.amount) return "Select an approximate amount for Debt #" + (i + 1) + ".";
        if (!debt.security) return "Select whether Debt #" + (i + 1) + " is secured or unsecured.";
        if (!debt.stage) return "Select the current stage for Debt #" + (i + 1) + ".";
        if (debt.type === "auto_repossession" && !debt.autoRepossessionStatus) {
          return "For Auto Repossession on Debt #" + (i + 1) + ", tell us whether the vehicle was already repossessed.";
        }
        if (!debt.documentStatus) return "Select whether you have documents for Debt #" + (i + 1) + ".";
      }
    }

    if (step === 4) {
      if (!data.deadlineStatus) return "Select whether any papers mention a deadline, court date, hearing, judgment, or garnishment.";
      if (!data.validationNotice) return "Select whether you received a debt validation notice.";
      if (!data.behaviors.length) return "Select what collectors are doing, or choose “None of these.”";
    }

    if (step === 6) {
      if (!data.deliveryChannel) return "Choose where we should send your results.";
      if (!data.firstName.trim()) return "Enter your first name.";
      if (!data.lastName.trim()) return "Enter your last name.";
      if (["sms", "whatsapp", "call"].includes(data.deliveryChannel) && !isValidPhone(data.phone)) {
        return "Enter a valid 10-digit phone number.";
      }
      if (data.deliveryChannel === "email" && !isValidEmail(data.email)) return "Enter a valid email address.";
      if (data.deliveryChannel === "sms" && !data.smsConsent) return "Please accept the SMS consent to receive results by text message.";
      if (data.deliveryChannel === "whatsapp" && !data.whatsappConsent) return "Please accept the WhatsApp consent to receive results by WhatsApp.";
    }

    if (step === 7) {
      if (!data.followUpPreference) return "Choose a follow-up preference.";
      if (["call_now", "immediate_callback", "call_today", "schedule_call"].includes(data.followUpPreference) && !isValidPhone(data.phone)) {
        return "Enter a valid phone number so the team can follow up by phone.";
      }
      if (data.followUpPreference === "email_first" && !isValidEmail(data.email)) return "Enter a valid email address for email follow-up.";
    }

    return "";
  }

  function isValidEmail(value) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value || "").trim());
  }

  function isValidPhone(value) {
    return String(value || "").replace(/\D/g, "").length === 10;
  }

  function render() {
    var content = "";
    if (ui.step === 0) content = renderEntry();
    if (ui.step === 1) content = renderEligibility();
    if (ui.step === 2) content = renderDebtCount();
    if (ui.step === 3) content = renderDebtDetails();
    if (ui.step === 4) content = renderUrgencyDetails();
    if (ui.step === 5) content = renderResults();
    if (ui.step === 6) content = renderDelivery();
    if (ui.step === 7) content = renderFollowUp();
    if (ui.step === 8) content = renderThankYou();

    root.innerHTML = [
      '<div class="clw">',
        '<div class="cl-card">',
          renderHeader(),
          ui.step < 8 ? renderProgress() : '',
          '<div class="cl-body">',
            content,
            ui.error ? '<div class="cl-error">' + h(ui.error) + '</div>' : '',
            renderActions(),
            renderDisclaimer(),
          '</div>',
        '</div>',
        renderFooterMini(),
      '</div>'
    ].join("");
  }

  function renderHeader() {
    return [
      '<div class="cl-header">',
        '<div class="cl-logo-wrap">',
          '<img class="cl-logo" src="' + h(CONFIG.logoUrl) + '" alt="Credo Legal" onerror="this.style.display=\'none\'; this.nextElementSibling.style.display=\'block\';">',
          '<div class="cl-brand-fallback" style="display:none;">Credo Legal</div>',
        '</div>',
        '<a class="cl-call-top" href="' + h(CONFIG.phoneHref) + '">Call now ' + h(CONFIG.phoneDisplay) + '</a>',
      '</div>'
    ].join("");
  }

  function renderProgress() {
    var labels = ["Start", "Eligibility", "Debt Count", "Debt Details", "Priority", "Results", "Delivery", "Follow-up"];
    var visibleStep = Math.min(ui.step + 1, labels.length);
    var pct = Math.max(8, Math.round((visibleStep / labels.length) * 100));
    return [
      '<div class="cl-progress-wrap">',
        '<div class="cl-progress-meta">',
          '<span>' + h(labels[ui.step] || "") + '</span>',
          '<span>Step ' + visibleStep + ' of ' + labels.length + '</span>',
        '</div>',
        '<div class="cl-progress"><span style="width:' + pct + '%"></span></div>',
      '</div>'
    ].join("");
  }

  function renderEntry() {
    return [
      '<div class="cl-eyebrow">Free intake check</div>',
      '<h2 class="cl-title">Find out where your debt situation stands.</h2>',
      '<p class="cl-subtitle">Answer a few questions about your debt, collector activity, documents, and deadlines. You’ll get a priority level, a readiness score, and a recommended next step before you choose how to be contacted.</p>',
      '<div class="cl-grid cl-grid-2">',
        optionCard("entryPath", "urgent", "I Need Urgent Debt Help", "I was sued, my wages are being garnished, or collectors are escalating."),
        optionCard("entryPath", "options_check", "Check My Debt Defense Options", "I want to understand where I stand and what options may be available."),
      '</div>',
      '<div class="cl-inline-note"><strong>What you’ll receive:</strong> a Debt Defense Priority Level, a Case Readiness Score, and a checklist of what to prepare next.</div>'
    ].join("");
  }

  function renderEligibility() {
    var excluded = data.state && CONFIG.excludedStates.includes(data.state);
    var business = data.personType === "business";
    return [
      '<div class="cl-eyebrow">Eligibility</div>',
      '<h2 class="cl-title">First, let’s confirm the basics.</h2>',
      '<p class="cl-subtitle">Credo Legal reviews consumer debt issues for individuals. This step helps route your request correctly.</p>',
      '<div class="cl-form-grid">',
        '<div class="cl-field">',
          '<label for="cl-state">Your state</label>',
          '<select id="cl-state" data-field="state">',
            '<option value="">Select state</option>',
            STATES.map(function (state) {
              return '<option value="' + h(state[0]) + '" ' + (data.state === state[0] ? 'selected' : '') + '>' + h(state[1]) + (CONFIG.excludedStates.includes(state[0]) ? ' — currently not serviced' : '') + '</option>';
            }).join(""),
          '</select>',
          '<div class="cl-help">Current excluded-state configuration: ' + h(CONFIG.excludedStates.join(", ")) + '.</div>',
        '</div>',
        '<div class="cl-field">',
          '<label for="cl-zip">ZIP code <span class="cl-help">optional</span></label>',
          '<input id="cl-zip" data-field="zip" inputmode="numeric" placeholder="5-digit ZIP" value="' + h(data.zip) + '">',
        '</div>',
      '</div>',
      '<div style="margin-top:18px;" class="cl-label">Who is this debt help for?</div>',
      '<div class="cl-grid cl-grid-3" style="margin-top:10px;">',
        optionCard("personType", "self", "Myself", "I’m looking for help with my own debt."),
        optionCard("personType", "family", "A family member", "I’m helping another individual with their debt."),
        optionCard("personType", "business", "A business", "This debt belongs to a business entity."),
      '</div>',
      data.personType === "family" ? renderAuthorizedQuestion() : '',
      excluded ? '<div class="cl-warning"><strong>State eligibility note:</strong> Credo Legal is currently configured as not servicing ' + h(getStateName(data.state)) + '. You can still continue to see the summary, but the request may be marked as not a fit.</div>' : '',
      business ? '<div class="cl-warning"><strong>Consumer-debt note:</strong> This flow is designed for individuals with consumer debt. Business debt will be marked as not a fit unless the intake team decides otherwise.</div>' : ''
    ].join("");
  }

  function renderAuthorizedQuestion() {
    return [
      '<div style="margin-top:18px;" class="cl-label">Are you authorized to speak with Credo Legal about this person’s debt?</div>',
      '<div class="cl-grid cl-grid-3" style="margin-top:10px;">',
        optionCard("authorizedForOther", "yes", "Yes", "I can discuss this request."),
        optionCard("authorizedForOther", "no", "No", "I’m only gathering information."),
        optionCard("authorizedForOther", "not_sure", "Not sure", "The team may need to confirm."),
      '</div>'
    ].join("");
  }

  function renderDebtCount() {
    var countOptions = [
      ["1", "1 debt"], ["2", "2 debts"], ["3", "3 debts"], ["4", "4 debts"], ["5", "5 debts"], ["6_plus", "6+ debts"]
    ];
    return [
      '<div class="cl-eyebrow">Debt inventory</div>',
      '<h2 class="cl-title">How many debts do you want reviewed?</h2>',
      '<p class="cl-subtitle">You’ll be able to enter the type and approximate amount for each debt. If you have more than six, start with the most important ones and add more if needed.</p>',
      '<div class="cl-grid cl-grid-3">',
        countOptions.map(function (opt) {
          var selected = data.debtCountChoice === opt[0];
          return '<button type="button" class="cl-option ' + (selected ? 'is-selected' : '') + '" data-action="set-debt-count" data-value="' + h(opt[0]) + '"><span class="cl-option-title">' + h(opt[1]) + '</span><span class="cl-option-text">Include this in the review.</span></button>';
        }).join(""),
      '</div>',
      data.debtCountChoice === "6_plus" ? '<div class="cl-inline-note">For 6+ debts, this widget starts with six debt cards. You can add more on the next step.</div>' : ''
    ].join("");
  }

  function renderDebtDetails() {
    return [
      '<div class="cl-eyebrow">Debt details</div>',
      '<h2 class="cl-title">Tell us about each debt.</h2>',
      '<p class="cl-subtitle">Credo Legal focuses on unsecured consumer debts such as credit card, medical, payday loan, utility, and certain auto repossession deficiency matters.</p>',
      data.debts.map(renderDebtCard).join(""),
      '<div class="cl-small-row" style="margin-top:16px;">',
        '<button type="button" class="cl-btn cl-btn-secondary" data-action="add-debt">+ Add another debt</button>',
        data.debts.length > 1 ? '<span class="cl-help">Current debts entered: ' + data.debts.length + '</span>' : '',
      '</div>'
    ].join("");
  }

  function renderDebtCard(debt, index) {
    return [
      '<div class="cl-debt-card">',
        '<div class="cl-small-row" style="justify-content:space-between;">',
          '<div><h3>Debt #' + (index + 1) + '</h3><p class="cl-help">Type, amount, stage, security, and documents.</p></div>',
          data.debts.length > 1 ? '<button type="button" class="cl-btn cl-btn-ghost" data-action="remove-debt" data-index="' + index + '">Remove</button>' : '',
        '</div>',
        '<div class="cl-form-grid">',
          '<div class="cl-field">',
            '<label>Debt type</label>',
            renderDebtTypeSelect(index, debt.type),
          '</div>',
          '<div class="cl-field">',
            '<label>Approximate amount</label>',
            renderSelect("amount", index, AMOUNT_OPTIONS, debt.amount, "Select amount"),
          '</div>',
          '<div class="cl-field">',
            '<label>Is this debt unsecured?</label>',
            renderSelect("security", index, SECURITY_OPTIONS, debt.security, "Select security"),
          '</div>',
          '<div class="cl-field">',
            '<label>What stage is this debt at?</label>',
            renderSelect("stage", index, STAGE_OPTIONS, debt.stage, "Select stage"),
          '</div>',
          debt.type === "auto_repossession" ? renderAutoRepoQuestion(index, debt.autoRepossessionStatus) : '',
          '<div class="cl-field">',
            '<label>Do you have any document for this debt?</label>',
            renderSelect("documentStatus", index, DOCUMENT_OPTIONS, debt.documentStatus, "Select document status"),
          '</div>',
          '<div class="cl-field">',
            '<label>Creditor / collector name <span class="cl-help">optional</span></label>',
            '<input data-index="' + index + '" data-debt-field="creditorName" placeholder="Example: Midland, Portfolio Recovery, Capital One" value="' + h(debt.creditorName) + '">',
          '</div>',
        '</div>',
      '</div>'
    ].join("");
  }

  function renderDebtTypeSelect(index, selected) {
    var supported = DEBT_TYPES.filter(function (x) { return x.group === "Supported"; });
    var unsupported = DEBT_TYPES.filter(function (x) { return x.group === "Not supported"; });
    var review = DEBT_TYPES.filter(function (x) { return x.group === "Needs review"; });
    return [
      '<select data-index="' + index + '" data-debt-field="type">',
        '<option value="">Select debt type</option>',
        '<optgroup label="Supported debt types">',
          supported.map(optionHtml(selected)).join(""),
        '</optgroup>',
        '<optgroup label="Not supported debt types">',
          unsupported.map(optionHtml(selected)).join(""),
        '</optgroup>',
        '<optgroup label="Other">',
          review.map(optionHtml(selected)).join(""),
        '</optgroup>',
      '</select>'
    ].join("");
  }

  function renderSelect(field, index, options, selected, placeholder) {
    return [
      '<select data-index="' + index + '" data-debt-field="' + h(field) + '">',
        '<option value="">' + h(placeholder) + '</option>',
        options.map(optionHtml(selected)).join(""),
      '</select>'
    ].join("");
  }

  function optionHtml(selected) {
    return function (item) {
      return '<option value="' + h(item.key) + '" ' + (selected === item.key ? 'selected' : '') + '>' + h(item.label) + '</option>';
    };
  }

  function renderAutoRepoQuestion(index, selected) {
    var options = [
      { key: "repossessed_yes", label: "Yes, the vehicle was already repossessed" },
      { key: "repossessed_no", label: "No, the vehicle has not been repossessed" },
      { key: "not_sure", label: "I’m not sure" }
    ];
    return [
      '<div class="cl-field">',
        '<label>Was the vehicle already repossessed?</label>',
        '<select data-index="' + index + '" data-debt-field="autoRepossessionStatus">',
          '<option value="">Select one</option>',
          options.map(optionHtml(selected)).join(""),
        '</select>',
        '<div class="cl-help">Credo Legal focuses on unsecured debt. A post-repossession deficiency balance may need review.</div>',
      '</div>'
    ].join("");
  }

  function renderUrgencyDetails() {
    var needsUploadPrompt = shouldShowUploadPrompt();
    return [
      '<div class="cl-eyebrow">Priority check</div>',
      '<h2 class="cl-title">Now let’s check urgency and collector behavior.</h2>',
      '<p class="cl-subtitle">This helps determine whether your situation appears early-stage, active, high-priority, or critical for intake review.</p>',
      '<div class="cl-form-grid">',
        '<div class="cl-field cl-field-full">',
          '<label>Do any papers mention a deadline, court date, hearing date, judgment, or garnishment?</label>',
          '<select data-field="deadlineStatus">',
            '<option value="">Select one</option>',
            DEADLINE_OPTIONS.map(function (opt) { return '<option value="' + h(opt.key) + '" ' + (data.deadlineStatus === opt.key ? 'selected' : '') + '>' + h(opt.label) + '</option>'; }).join(""),
          '</select>',
        '</div>',
        '<div class="cl-field cl-field-full">',
          '<label>Did you receive a written debt validation notice?</label>',
          '<select data-field="validationNotice">',
            '<option value="">Select one</option>',
            VALIDATION_OPTIONS.map(function (opt) { return '<option value="' + h(opt.key) + '" ' + (data.validationNotice === opt.key ? 'selected' : '') + '>' + h(opt.label) + '</option>'; }).join(""),
          '</select>',
        '</div>',
      '</div>',
      '<div style="margin-top:18px;" class="cl-label">What are collectors doing? Select all that apply.</div>',
      '<div class="cl-grid cl-grid-2" style="margin-top:10px;">',
        BEHAVIOR_OPTIONS.map(function (opt) {
          return toggleCard("behaviors", opt.key, opt.label, behaviorDescription(opt.key));
        }).join(""),
      '</div>',
      needsUploadPrompt ? renderUploadPrompt() : renderOptionalUploadPrompt(),
      '<div class="cl-form-grid">',
        '<div class="cl-field cl-field-full">',
          '<label>Tell us more about your situation <span class="cl-help">optional</span></label>',
          '<textarea data-field="userDescription" placeholder="Example: A collector has been calling me at work, and I received a letter last week but I’m not sure what it means.">' + h(data.userDescription) + '</textarea>',
        '</div>',
      '</div>'
    ].join("");
  }

  function behaviorDescription(key) {
    var map = {
      calling_repeatedly: "Frequent calls or repeated attempts.",
      calling_workplace: "Calls to your job or employer.",
      contacting_others: "Contacting people besides you.",
      threatening: "Threatening language or pressure.",
      abusive_language: "Insults, abusive wording, or intimidation.",
      threatening_arrest: "Threats about jail or criminal charges.",
      threatening_garnishment: "Threats involving wages, bank funds, or garnishment.",
      refusing_verify: "Won’t explain or validate the debt.",
      letters_only: "Letters or notices, but no aggressive conduct selected.",
      none_of_these: "No collector behavior listed here."
    };
    return map[key] || "";
  }

  function shouldShowUploadPrompt() {
    return data.debts.some(function (debt) {
      return debt.type === "other_not_sure" || debt.stage === "not_sure" || debt.documentStatus === "not_sure" || debt.documentStatus === "summons_lawsuit" || debt.documentStatus === "judgment" || debt.documentStatus === "garnishment_order";
    }) || data.deadlineStatus === "not_sure" || data.validationNotice === "received_not_sure" || data.validationNotice === "not_sure";
  }

  function renderUploadPrompt() {
    return [
      '<div class="cl-upload-placeholder">',
        '<h3>Not sure how to explain the document?</h3>',
        '<p class="cl-help">If you have a letter, summons, judgment, garnishment notice, or collection document, a future upload tool can be placed here. For this MVP, clicking below records that you have documents available.</p>',
        data.uploadIntent ? '<div class="cl-pill-row"><span class="cl-pill cl-pill-good">Document upload intent saved</span></div>' : '',
        '<div class="cl-small-row" style="margin-top:12px;">',

  function getCalculations() {
    var qualification = getQualification();
    var stageScore = getMaxStageScore();
    var deadlineScore = getOptionScore(DEADLINE_OPTIONS, data.deadlineStatus);
    var validationScore = getOptionScore(VALIDATION_OPTIONS, data.validationNotice);
    var behaviorScore = Math.min(45, data.behaviors.reduce(function (sum, key) { return sum + getOptionScore(BEHAVIOR_OPTIONS, key); }, 0));
    var amountScore = getLargestAmountScore();
    var countScore = data.debts.length >= 6 ? 15 : data.debts.length >= 3 ? 10 : data.debts.length === 2 ? 5 : 0;
    var entryScore = data.entryPath === "urgent" ? 10 : 0;
    var urgencyScore = Math.min(100, stageScore + deadlineScore + validationScore + behaviorScore + amountScore + countScore + entryScore);
    var urgencyLevel = urgencyScore >= 75 ? "Critical" : urgencyScore >= 50 ? "High" : urgencyScore >= 25 ? "Moderate" : "Low";
    var readinessScore = getReadinessScore();
    var readinessLevel = readinessScore >= 81 ? "High-Readiness Case" : readinessScore >= 61 ? "Ready for Initial Review" : readinessScore >= 31 ? "Partially Ready" : "Needs More Information";

    return {
      qualificationStatus: qualification.status,
      qualificationReasons: qualification.reasons,
      qualificationClass: qualification.className,
      urgencyScore: urgencyScore,
      urgencyLevel: urgencyLevel,
      urgencyClass: urgencyLevel === "Critical" ? "cl-pill-critical" : urgencyLevel === "High" ? "cl-pill-high" : urgencyLevel === "Moderate" ? "" : "cl-pill-good",
      readinessScore: readinessScore,
      readinessLevel: readinessLevel,
      highestRiskStage: getHighestRiskStage(),
      hasLawsuit: hasLawsuit(),
      hasDefaultJudgment: hasDefaultJudgment(),
      hasGarnishment: hasGarnishment(),
      hasHarassment: hasHarassment()
    };
  }

  function getOptionScore(list, key) {
    var item = list.find(function (x) { return x.key === key; });
    return item ? item.score : 0;
  }

  function getMaxStageScore() {
    return data.debts.reduce(function (max, debt) {
      return Math.max(max, getOptionScore(STAGE_OPTIONS, debt.stage));
    }, 0);
  }

  function getHighestRiskStage() {
    var sorted = data.debts.slice().sort(function (a, b) {
      return getOptionScore(STAGE_OPTIONS, b.stage) - getOptionScore(STAGE_OPTIONS, a.stage);
    });
    return sorted[0] ? sorted[0].stage : "";
  }

  function getLargestAmountScore() {
    return data.debts.reduce(function (max, debt) {
      return Math.max(max, getAmountOption(debt.amount).score || 0);
    }, 0);
  }

  function hasLawsuit() {
    return data.debts.some(function (d) { return d.stage === "lawsuit" || d.documentStatus === "summons_lawsuit"; }) || ["within_7", "within_8_14", "within_15_30", "yes_not_sure_when"].includes(data.deadlineStatus);
  }

  function hasDefaultJudgment() {
    return data.debts.some(function (d) { return d.stage === "default_judgment" || d.documentStatus === "judgment"; });
  }

  function hasGarnishment() {
    return data.debts.some(function (d) { return d.stage === "garnishment" || d.stage === "wages_bank" || d.documentStatus === "garnishment_order"; });
  }

  function hasHarassment() {
    return data.behaviors.some(function (key) {
      return !["none_of_these", "letters_only"].includes(key);
    });
  }

  function getQualification() {
    var reasons = [];
    var className = "";
    var stateExcluded = CONFIG.excludedStates.includes(data.state);
    var business = data.personType === "business";
    var eligibleDebts = data.debts.filter(isDebtEligible);
    var conditionalDebts = data.debts.filter(isDebtConditional);
    var unsupportedDebts = data.debts.filter(function (d) { return UNSUPPORTED_DEBT_KEYS.includes(d.type); });
    var supportedDebts = data.debts.filter(function (d) { return SUPPORTED_DEBT_KEYS.includes(d.type); });

    if (stateExcluded) reasons.push("State currently not serviced: " + data.state);
    if (business) reasons.push("Business debt is outside the consumer-debt flow");
    if (!supportedDebts.length && unsupportedDebts.length) reasons.push("Only unsupported debt types selected");
    if (!eligibleDebts.length && supportedDebts.length && data.debts.every(function (d) { return d.security === "secured" && !(d.type === "auto_repossession" && d.autoRepossessionStatus === "repossessed_yes"); })) {
      reasons.push("Selected debt appears secured with collateral");
    }

    if (stateExcluded || business || (!supportedDebts.length && unsupportedDebts.length) || (!eligibleDebts.length && supportedDebts.length && !conditionalDebts.length)) {
      return { status: "Not a Fit", reasons: reasons, className: "cl-pill-critical" };
    }

    if (eligibleDebts.length && (unsupportedDebts.length || conditionalDebts.length)) {
      if (unsupportedDebts.length) reasons.push("Some selected debts are not supported");
      if (conditionalDebts.length) reasons.push("Some debts need review to confirm unsecured status");
      return { status: "Partially Qualified", reasons: reasons, className: "cl-pill-high" };
    }

    if (!eligibleDebts.length && conditionalDebts.length) {
      reasons.push("Documents or more details may be needed to confirm fit");
      return { status: "Needs Review", reasons: reasons, className: "cl-pill-high" };
    }

    if (eligibleDebts.length) {
      return { status: "Qualified", reasons: ["Supported unsecured consumer-debt issue selected"], className: "cl-pill-good" };
    }

    return { status: "Needs Review", reasons: ["Debt type or security status is unclear"], className: "cl-pill-high" };
  }

  function isDebtEligible(debt) {
    if (!SUPPORTED_DEBT_KEYS.includes(debt.type)) return false;
    if (debt.type === "auto_repossession") {
      return debt.security === "unsecured" || debt.autoRepossessionStatus === "repossessed_yes";
    }
    return debt.security === "unsecured";
  }

  function isDebtConditional(debt) {
    if (debt.type === "other_not_sure") return true;
    if (SUPPORTED_DEBT_KEYS.includes(debt.type) && debt.security === "not_sure") return true;
    if (debt.type === "auto_repossession" && debt.autoRepossessionStatus === "not_sure") return true;
    return false;
  }

  function getReadinessScore() {
    var score = 0;
    if (data.debts.some(function (d) { return SUPPORTED_DEBT_KEYS.includes(d.type); })) score += 20;
    if (data.debts.some(function (d) { return d.security === "unsecured" || (d.type === "auto_repossession" && d.autoRepossessionStatus === "repossessed_yes"); })) score += 15;
    if (data.debts.every(function (d) { return !!d.amount; })) score += 15;
    if (data.debts.every(function (d) { return d.stage && d.stage !== "not_sure"; })) score += 15;
    if (data.debts.some(function (d) { return d.creditorName.trim(); })) score += 10;
    if (data.uploadIntent || data.debts.some(function (d) { return !["", "none", "not_sure"].includes(d.documentStatus); })) score += 10;
    if (data.deadlineStatus && data.deadlineStatus !== "not_sure") score += 10;
    if (data.behaviors.length && !data.behaviors.includes("none_of_these")) score += 5;
    return Math.min(100, score);
  }

  function getMissingReadinessItems() {
    var items = [];
    if (!data.debts.some(function (d) { return SUPPORTED_DEBT_KEYS.includes(d.type); })) items.push("Confirm whether any debt is credit card, medical, payday loan, utilities, or auto repossession related.");
    if (!data.debts.some(function (d) { return d.security === "unsecured" || (d.type === "auto_repossession" && d.autoRepossessionStatus === "repossessed_yes"); })) items.push("Confirm whether the debt is unsecured or connected to a post-repossession balance.");
    if (!data.debts.every(function (d) { return !!d.amount; })) items.push("Approximate amount for each debt.");
    if (!data.debts.every(function (d) { return d.stage && d.stage !== "not_sure"; })) items.push("Current stage for each debt: collections, lawsuit, judgment, garnishment, or other.");
    if (!data.debts.some(function (d) { return d.creditorName.trim(); })) items.push("Creditor or debt collector name, if known.");
    if (!(data.uploadIntent || data.debts.some(function (d) { return !["", "none", "not_sure"].includes(d.documentStatus); }))) items.push("Any collection letter, notice, summons, judgment, or garnishment document.");
    if (!(data.deadlineStatus && data.deadlineStatus !== "not_sure")) items.push("Any deadline, court date, hearing date, judgment date, or garnishment date listed on the papers.");
    return items.slice(0, 5);
  }

  function getBranchMessage(calc) {
    if (calc.qualificationStatus === "Not a Fit") {
      return {
        title: "This may not fit Credo Legal’s current review criteria.",
        body: "Based on your answers, the issue may involve an excluded state, business debt, unsupported debt type, or secured debt. You can still send yourself the summary, but this request may be marked as not a fit for the intake team.",
        nextStep: "Review the summary and, if anything was selected incorrectly, restart the check or contact the team directly.",
        checklist: calc.qualificationReasons.length ? calc.qualificationReasons : ["Confirm state, debt type, and whether the debt is unsecured."]
      };
    }

    if (calc.hasGarnishment) {
      return {
        title: "Active garnishment or wage/bank impact may be involved.",
        body: "Your answers suggest that wages, bank funds, or an enforcement notice may already be involved. These situations can move quickly and should be reviewed promptly.",
        nextStep: "Prepare any garnishment, bank levy, judgment, payroll, or court paperwork and request a prompt follow-up.",
        checklist: ["Garnishment or levy notice", "Judgment papers", "Employer or bank notice", "Date wages or bank funds were affected"]
      };
    }

    if (calc.hasDefaultJudgment) {
      return {
        title: "A default judgment may be involved.",
        body: "A judgment can give a collector stronger collection tools depending on the court order and state law. Your next step is to understand what judgment was entered and whether any options remain.",
        nextStep: "Prepare the judgment paperwork, court name, date entered, and any wage or bank collection notices.",
        checklist: ["Copy of judgment", "Court name", "Date judgment was entered", "Any garnishment or bank levy notice"]
      };
    }

    if (calc.hasLawsuit) {
      return {
        title: "Do not ignore court papers or lawsuit deadlines.",
        body: "Debt lawsuits and court papers may involve strict response deadlines. Failing to respond can increase the risk of a default judgment or other collection action.",
        nextStep: "Have the documents reviewed and confirm whether a response, appearance, or other action is required.",
        checklist: ["Summons or complaint", "Date you received the papers", "Court name", "Plaintiff / creditor / collector name", "Any response deadline or hearing date"]
      };
    }

    if (calc.hasHarassment) {
      return {
        title: "Collector behavior may need review.",
        body: "Your answers suggest collectors may be contacting you aggressively or using pressure tactics. Certain abusive, deceptive, or unfair collection practices may be restricted under consumer protection laws.",
        nextStep: "Document what happened, when it happened, who contacted you, and whether they called your workplace or other people.",
        checklist: ["Call logs", "Voicemails or text messages", "Letters or notices", "Names of collectors", "Workplace or third-party contact details"]
      };
    }

    return {
      title: "Your debt situation appears ready for an options review.",
      body: "Based on your answers, your situation may involve unsecured consumer debt that Credo Legal can review. The priority level depends on stage, documents, deadlines, and collector behavior.",
      nextStep: "Send yourself the results, prepare your debt documents, and choose how you want the team to follow up.",
      checklist: ["Creditor or collector name", "Approximate debt amount", "Any notices or collection letters", "Dates of recent calls or letters"]
    };
  }

  async function submitLead() {
    var validationError = validateStep(7);
    if (validationError) {
      ui.error = validationError;
      render();
      return;
    }

    ui.submitting = true;
    render();

    var payload = buildPayload();
    var isDemo = !CONFIG.googleScriptUrl || CONFIG.googleScriptUrl.indexOf("PASTE_YOUR") === 0;

    try {
      if (isDemo) {
        console.log("Credo Legal lead payload", payload);
        ui.submittedInDemoMode = true;
      } else {
        await fetch(CONFIG.googleScriptUrl, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
      }
      ui.step = 8;
      ui.error = "";
    } catch (error) {
      ui.error = "Something went wrong while submitting the request. Please call " + CONFIG.phoneDisplay + " or try again.";
      console.error(error);
    } finally {
      ui.submitting = false;
      render();
    }
  }

  function buildPayload() {
    var calc = getCalculations();
    var debtTypeLabels = data.debts.map(function (d) { return getLabel(DEBT_TYPES, d.type); }).filter(Boolean);
    var supportedDebtTypes = unique(data.debts.filter(function (d) { return SUPPORTED_DEBT_KEYS.includes(d.type); }).map(function (d) { return getLabel(DEBT_TYPES, d.type); }));
    var unsupportedDebtTypes = unique(data.debts.filter(function (d) { return UNSUPPORTED_DEBT_KEYS.includes(d.type); }).map(function (d) { return getLabel(DEBT_TYPES, d.type); }));
    var totalEstimate = data.debts.reduce(function (sum, d) { return sum + (getAmountOption(d.amount).estimate || 0); }, 0);
    var largestDebt = data.debts.slice().sort(function (a, b) { return (getAmountOption(b.amount).estimate || 0) - (getAmountOption(a.amount).estimate || 0); })[0] || makeDebt();
    var collectorNames = unique(data.debts.map(function (d) { return d.creditorName.trim(); }).filter(Boolean));

    return {
      created_at: new Date().toISOString(),
      lead_id: data.leadId,
      entry_path: data.entryPath === "urgent" ? "I Need Urgent Debt Help" : "Debt Defense Options Check",
      first_name: data.firstName.trim(),
      last_name: data.lastName.trim(),
      phone: data.phone.trim(),
      email: data.email.trim(),
      state: data.state,
      state_name: getStateName(data.state),
      zip: data.zip.trim(),
      delivery_channel: getDeliveryLabel(data.deliveryChannel),
      follow_up_preference: getFollowUpLabel(data.followUpPreference),
      sms_consent: data.smsConsent ? "Yes" : "No",
      whatsapp_consent: data.whatsappConsent ? "Yes" : "No",
      person_type: data.personType,
      authorized_for_other: data.authorizedForOther,

      qualification_status: calc.qualificationStatus,
      qualification_reasons: calc.qualificationReasons.join("; "),
      urgency_score: calc.urgencyScore,
      urgency_level: calc.urgencyLevel,
      readiness_score: calc.readinessScore,
      readiness_level: calc.readinessLevel,
      recommended_next_action: getBranchMessage(calc).nextStep,

      number_of_debts: data.debts.length,
      total_estimated_debt: totalEstimate ? "$" + totalEstimate.toLocaleString() + "+ estimated from ranges" : "Not sure",
      largest_debt_amount: getAmountOption(largestDebt.amount).label,
      supported_debt_types: supportedDebtTypes.join(", "),
      unsupported_debt_types: unsupportedDebtTypes.join(", "),
      all_debt_types: unique(debtTypeLabels).join(", "),
      debt_security: unique(data.debts.map(function (d) { return getLabel(SECURITY_OPTIONS, d.security); }).filter(Boolean)).join(", "),
      debt_stage: getLabel(STAGE_OPTIONS, calc.highestRiskStage),
      lawsuit_or_summons: calc.hasLawsuit ? "Yes" : "No",
      deadline_or_court_date: getLabel(DEADLINE_OPTIONS, data.deadlineStatus),
      default_judgment: calc.hasDefaultJudgment ? "Yes" : "No",
      garnishment: calc.hasGarnishment ? "Yes" : "No",
      wages_or_bank_affected: data.debts.some(function (d) { return d.stage === "wages_bank"; }) ? "Yes" : "No",

      collector_calls: (data.behaviors.includes("calling_repeatedly") || data.behaviors.includes("letters_only") || data.debts.some(function (d) { return d.stage === "calls"; })) ? "Yes" : "No",
      workplace_calls: data.behaviors.includes("calling_workplace") ? "Yes" : "No",
      family_or_friend_contact: data.behaviors.includes("contacting_others") ? "Yes" : "No",
      threats_or_abusive_language: data.behaviors.some(function (x) { return ["threatening", "abusive_language", "threatening_arrest", "threatening_garnishment"].includes(x); }) ? "Yes" : "No",
      collector_behaviors: data.behaviors.map(function (key) { return getLabel(BEHAVIOR_OPTIONS, key); }).join(", "),
      validation_notice_status: getLabel(VALIDATION_OPTIONS, data.validationNotice),
      has_documents: data.debts.some(function (d) { return !["none", "", "not_sure"].includes(d.documentStatus); }) || data.uploadIntent ? "Yes" : "No",
      upload_intent: data.uploadIntent ? "Yes" : "No",
      collector_names: collectorNames.join(", "),
      user_description: data.userDescription.trim(),
      debts_json: JSON.stringify(data.debts.map(function (d, idx) {
        return {
          debt_number: idx + 1,
          type: getLabel(DEBT_TYPES, d.type),
          amount: getAmountOption(d.amount).label,
          security: getLabel(SECURITY_OPTIONS, d.security),
          stage: getLabel(STAGE_OPTIONS, d.stage),
          auto_repossession_status: d.autoRepossessionStatus,
          document_status: getLabel(DOCUMENT_OPTIONS, d.documentStatus),
          creditor_name: d.creditorName.trim()
        };
      })),
      raw_answers_json: JSON.stringify(data)
    };
  }

  function unique(values) {
    return Array.from(new Set(values.filter(Boolean)));
  }

  function getDeliveryLabel(key) {
    var item = DELIVERY_OPTIONS.find(function (x) { return x.key === key; });
    return item ? item.title : "";
  }

  function getFollowUpLabel(key) {
    var item = FOLLOW_UP_OPTIONS_DEFAULT.concat(FOLLOW_UP_OPTIONS_URGENT).find(function (x) { return x.key === key; });
    return item ? item.title : "";
  }
})();
</script>
